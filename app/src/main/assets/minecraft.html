<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Minecraft</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#87CEEB;overflow:hidden;width:100vw;height:100vh;touch-action:none}
#c{display:block;width:100%;height:100%;position:fixed;top:0;left:0}

/* Crosshair */
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:20;width:20px;height:20px}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.85)}
#crosshair::before{left:50%;top:0;width:2px;height:100%;margin-left:-1px}
#crosshair::after{top:50%;left:0;height:2px;width:100%;margin-top:-1px}

/* HUD bottom */
#hud{position:fixed;bottom:0;left:0;right:0;pointer-events:none;z-index:35}

/* Hotbar */
#hotbar{
  display:flex;justify-content:center;gap:3px;
  padding:4px 0 6px;
}
.hslot{
  width:44px;height:44px;
  background:rgba(80,80,80,0.85);
  border:2px solid #555;
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;
  position:relative;pointer-events:all;
  flex-shrink:0;
}
.hslot.active{border-color:#fff;background:rgba(110,110,110,0.9)}
.hslot span{font-size:9px;position:absolute;bottom:1px;right:3px;color:#fff;font-family:monospace}

/* Touch controls */
#ctrl{position:fixed;inset:0;z-index:30;pointer-events:none}
#lpad{position:absolute;left:0;bottom:0;width:45%;height:52%;pointer-events:all;opacity:0}
#rpad{position:absolute;right:0;top:0;width:55%;height:65%;pointer-events:all;opacity:0}
.vjoy{
  position:absolute;border-radius:50%;pointer-events:none;display:none;
  width:90px;height:90px;transform:translate(-50%,-50%);
  border:2px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.08);
}
.vdot{position:absolute;border-radius:50%;pointer-events:none;
  width:36px;height:36px;top:27px;left:27px;
  background:rgba(255,255,255,0.45);transform:none}

.btn{
  position:absolute;pointer-events:all;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;touch-action:none;
  font-weight:900;cursor:pointer;font-size:18px;
  border:3px solid;
}
#btn-break{
  left:16px;bottom:170px;width:66px;height:66px;
  background:rgba(200,60,0,0.88);border-color:#ff6600;color:#fff;
}
#btn-place{
  left:96px;bottom:170px;width:54px;height:54px;
  background:rgba(0,140,0,0.85);border-color:#00ff44;color:#fff;font-size:14px;
}
#btn-jump{
  right:16px;bottom:170px;width:60px;height:60px;
  background:rgba(50,100,200,0.88);border-color:#66aaff;color:#fff;
}
#btn-back{
  left:10px;top:10px;width:38px;height:38px;
  background:rgba(0,0,0,0.55);border:2px solid #666;
  color:#aaa;font-size:18px;border-radius:50%;
  position:absolute;pointer-events:all;z-index:40;
}

/* Labels */
#lpad::after{content:'🕹 MOVE';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.3);font-size:10px;pointer-events:none}
#rpad::after{content:'👆 LOOK';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.3);font-size:10px;pointer-events:none}

/* Messages */
#msg{position:fixed;top:28%;left:50%;transform:translate(-50%,-50%);
  color:#fff;font-size:16px;font-weight:700;text-shadow:1px 1px 0 #000;
  pointer-events:none;opacity:0;transition:opacity .3s;z-index:50;
  font-family:'Courier New',monospace;text-align:center}
#msg.show{opacity:1}

/* Debug */
#dbg{position:fixed;top:8px;left:50%;transform:translateX(-50%);
  color:#fff;font-size:11px;font-family:monospace;text-shadow:1px 1px 0 #000;
  pointer-events:none;z-index:50;text-align:center}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="crosshair"></div>

<div id="hud">
  <div id="hotbar">
    <div class="hslot active" data-idx="0" id="hs0">🌱</div>
    <div class="hslot" data-idx="1" id="hs1">🟫</div>
    <div class="hslot" data-idx="2" id="hs2">🪨</div>
    <div class="hslot" data-idx="3" id="hs3">🪵</div>
    <div class="hslot" data-idx="4" id="hs4">🍃</div>
    <div class="hslot" data-idx="5" id="hs5">🏖️</div>
    <div class="hslot" data-idx="6" id="hs6">🪟</div>
  </div>
</div>

<div id="ctrl" style="display:none">
  <div id="lpad"></div>
  <div id="rpad"></div>
  <div class="vjoy" id="joy-l"><div class="vdot" id="joy-l-dot"></div></div>
  <div class="btn" id="btn-break">⛏</div>
  <div class="btn" id="btn-place">📦</div>
  <div class="btn" id="btn-jump">⬆</div>
  <div class="btn" id="btn-back">✕</div>
</div>

<div id="msg"></div>
<div id="dbg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════
const CHUNK_SIZE  = 16;
const WORLD_HEIGHT= 32;
const SEA_LEVEL   = 12;
const GRAVITY     = 28;   // m/s²
const JUMP_VEL    = 9;
const MOVE_SPEED  = 5.0;
const PLAYER_H    = 1.8;
const PLAYER_EYE  = 1.6;
const REACH       = 5;

// Block IDs
const AIR=0, GRASS=1, DIRT=2, STONE=3, LOG=4, LEAVES=5, SAND=6, GLASS=7, WATER=8;

const BLOCK_COLORS = {
  [GRASS]: {top:0x5aa832, side:0x7a5c3a, bot:0x7a5c3a},
  [DIRT]:  {top:0x8B6340, side:0x8B6340, bot:0x8B6340},
  [STONE]: {top:0x888888, side:0x888888, bot:0x888888},
  [LOG]:   {top:0x5C4033, side:0x6b4c2a, bot:0x5C4033},
  [LEAVES]:{top:0x2d8b2d, side:0x2d8b2d, bot:0x2d8b2d},
  [SAND]:  {top:0xd4c479, side:0xd4c479, bot:0xd4c479},
  [GLASS]: {top:0x99ccee, side:0x99ccee, bot:0x99ccee},
  [WATER]: {top:0x2255cc, side:0x2255cc, bot:0x2255cc},
};

const HOTBAR_BLOCKS = [GRASS, DIRT, STONE, LOG, LEAVES, SAND, GLASS];
const HOTBAR_EMOJI  = ['🌱','🟫','🪨','🪵','🍃','🏖️','🪟'];
let selectedSlot = 0;

// ══════════════════════════════════════════════
//  WORLD STORAGE
// ══════════════════════════════════════════════
// chunks[cx][cz] = Uint8Array[CHUNK_SIZE * WORLD_HEIGHT * CHUNK_SIZE]
const chunks = {};
// chunk meshes
const chunkMeshes = {};
const RENDER_DIST = 3; // chunks in each direction

function chunkKey(cx, cz){ return cx+','+cz; }
function blockIdx(lx, ly, lz){ return ly*(CHUNK_SIZE*CHUNK_SIZE)+lz*CHUNK_SIZE+lx; }

function getChunk(cx, cz){
  const k = chunkKey(cx,cz);
  if(!chunks[k]) generateChunk(cx,cz);
  return chunks[k];
}

function getBlock(wx, wy, wz){
  if(wy<0||wy>=WORLD_HEIGHT) return wy<0?STONE:AIR;
  const cx=Math.floor(wx/CHUNK_SIZE), cz=Math.floor(wz/CHUNK_SIZE);
  const lx=((wx%CHUNK_SIZE)+CHUNK_SIZE)%CHUNK_SIZE;
  const lz=((wz%CHUNK_SIZE)+CHUNK_SIZE)%CHUNK_SIZE;
  return getChunk(cx,cz)[blockIdx(lx,wy,lz)];
}

function setBlock(wx, wy, wz, id){
  if(wy<0||wy>=WORLD_HEIGHT) return;
  const cx=Math.floor(wx/CHUNK_SIZE), cz=Math.floor(wz/CHUNK_SIZE);
  const lx=((wx%CHUNK_SIZE)+CHUNK_SIZE)%CHUNK_SIZE;
  const lz=((wz%CHUNK_SIZE)+CHUNK_SIZE)%CHUNK_SIZE;
  getChunk(cx,cz)[blockIdx(lx,wy,lz)]=id;
  rebuildChunk(cx,cz);
  // rebuild neighbours if on edge
  if(lx===0) rebuildChunk(cx-1,cz);
  if(lx===CHUNK_SIZE-1) rebuildChunk(cx+1,cz);
  if(lz===0) rebuildChunk(cx,cz-1);
  if(lz===CHUNK_SIZE-1) rebuildChunk(cx,cz+1);
}

// ══════════════════════════════════════════════
//  WORLD GENERATION (simple noise)
// ══════════════════════════════════════════════
function noise2d(x, z, seed){
  let h = (x*374761393 + z*668265263 + seed*1442695037) | 0;
  h ^= h >>> 13; h = Math.imul(h, 1540483477); h ^= h >>> 15;
  return (h & 0x7fffffff) / 0x7fffffff;
}
function smoothNoise(x, z, scale, seed){
  const fx=x/scale, fz=z/scale;
  const ix=Math.floor(fx), iz=Math.floor(fz);
  const tx=fx-ix, tz=fz-iz;
  const tx2=tx*tx*(3-2*tx), tz2=tz*tz*(3-2*tz);
  const n00=noise2d(ix,iz,seed), n10=noise2d(ix+1,iz,seed);
  const n01=noise2d(ix,iz+1,seed), n11=noise2d(ix+1,iz+1,seed);
  return n00+(n10-n00)*tx2 + (n01-n00)*tz2 - (n10-n00)*tx2*tz2 + (n11-n10-n01+n00)*tx2*tz2;
}
function terrainHeight(wx, wz){
  let h = smoothNoise(wx,wz,20,42)*8
         +smoothNoise(wx,wz,8,137)*3
         +smoothNoise(wx,wz,4,999)*1.5;
  return Math.floor(SEA_LEVEL + h);
}

function generateChunk(cx, cz){
  const data = new Uint8Array(CHUNK_SIZE*WORLD_HEIGHT*CHUNK_SIZE);
  const k = chunkKey(cx,cz);
  chunks[k] = data;
  for(let lx=0;lx<CHUNK_SIZE;lx++){
    for(let lz=0;lz<CHUNK_SIZE;lz++){
      const wx=cx*CHUNK_SIZE+lx, wz=cz*CHUNK_SIZE+lz;
      const h=terrainHeight(wx,wz);
      // Fill stone
      for(let y=0;y<h-3&&y<WORLD_HEIGHT;y++) data[blockIdx(lx,y,lz)]=STONE;
      // Dirt layers
      const dirtTop=Math.min(h-1,WORLD_HEIGHT-1);
      for(let y=Math.max(0,h-3);y<dirtTop;y++) data[blockIdx(lx,y,lz)]=DIRT;
      if(dirtTop>=0&&dirtTop<WORLD_HEIGHT){
        data[blockIdx(lx,dirtTop,lz)]=h<SEA_LEVEL+1?SAND:GRASS;
      }
      // Trees (sparse)
      if(h>=SEA_LEVEL&&h<WORLD_HEIGHT-6){
        const r=noise2d(wx,wz,777);
        if(r>0.92){
          const trunk=4+Math.floor(noise2d(wx,wz,321)*2);
          for(let y=h;y<h+trunk&&y<WORLD_HEIGHT;y++) data[blockIdx(lx,y,lz)]=LOG;
          // Leaves
          for(let ly=-2;ly<=1;ly++) for(let lx2=-2;lx2<=2;lx2++) for(let lz2=-2;lz2<=2;lz2++){
            const by=h+trunk-1+ly, bx=lx+lx2, bz_=lz+lz2;
            if(by>=0&&by<WORLD_HEIGHT&&bx>=0&&bx<CHUNK_SIZE&&bz_>=0&&bz_<CHUNK_SIZE){
              if(Math.abs(lx2)+Math.abs(lz2)+Math.abs(ly)<4 && data[blockIdx(bx,by,bz_)]===AIR)
                data[blockIdx(bx,by,bz_)]=LEAVES;
            }
          }
        }
      }
    }
  }
}

// ══════════════════════════════════════════════
//  THREE.JS SETUP
// ══════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x87CEEB);
renderer.shadowMap.enabled = false;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87CEEB, 30, 80);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.05, 100);

// Lighting — только для arm (MeshLambertMaterial)
const ambient = new THREE.AmbientLight(0xffffff, 1.0);
scene.add(ambient);

// Block selection highlight
const hlGeo = new THREE.BoxGeometry(1.005,1.005,1.005);
const hlMat = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.3, wireframe:true});
const highlight = new THREE.Mesh(hlGeo, hlMat);
highlight.visible = false;
scene.add(highlight);

// Arm/hand model (simple box)
const armGeo = new THREE.BoxGeometry(0.3,0.3,0.8);
const armMat = new THREE.MeshBasicMaterial({color:0xffcc88});
const arm = new THREE.Mesh(armGeo, armMat);
arm.position.set(0.35,-0.35,-0.6);
camera.add(arm);
scene.add(camera);

// ══════════════════════════════════════════════
//  CHUNK MESH BUILDER
// ══════════════════════════════════════════════
const FACES = [
  // Верх: нормаль должна смотреть вверх (+Y) → порядок CCW снизу
  {dir:[0,1,0], corners:[[-0.5,0.5,0.5],[0.5,0.5,0.5],[0.5,0.5,-0.5],[-0.5,0.5,-0.5]], side:'top'},
  // Низ: нормаль должна смотреть вниз (-Y) → порядок CCW сверху
  {dir:[0,-1,0],corners:[[-0.5,-0.5,-0.5],[0.5,-0.5,-0.5],[0.5,-0.5,0.5],[-0.5,-0.5,0.5]],side:'bot'},
  {dir:[0,0,1], corners:[[-0.5,-0.5,0.5],[0.5,-0.5,0.5],[0.5,0.5,0.5],[-0.5,0.5,0.5]],side:'side'},
  {dir:[0,0,-1],corners:[[0.5,-0.5,-0.5],[-0.5,-0.5,-0.5],[-0.5,0.5,-0.5],[0.5,0.5,-0.5]],side:'side'},
  {dir:[1,0,0], corners:[[0.5,-0.5,0.5],[0.5,-0.5,-0.5],[0.5,0.5,-0.5],[0.5,0.5,0.5]],side:'side'},
  {dir:[-1,0,0],corners:[[-0.5,-0.5,-0.5],[-0.5,-0.5,0.5],[-0.5,0.5,0.5],[-0.5,0.5,-0.5]],side:'side'},
];

// Полупрозрачные блоки — грань рисуется если сосед прозрачный
function isTrans(id){ return id===AIR||id===WATER||id===GLASS; }
// Для листьев — рисуем грань если сосед — воздух или другой прозрачный (не лист к листу)
function needFace(id, nb){
  if(nb===AIR) return true;
  if(id===LEAVES) return isTrans(nb); // лист→лист скрываем, лист→воздух/вода/стекло рисуем
  return isTrans(nb);
}

function buildChunkMesh(cx, cz){
  const positions=[], colors=[], indices=[];
  let vi=0;
  const data=getChunk(cx,cz);
  for(let ly=0;ly<WORLD_HEIGHT;ly++)
  for(let lz=0;lz<CHUNK_SIZE;lz++)
  for(let lx=0;lx<CHUNK_SIZE;lx++){
    const id=data[blockIdx(lx,ly,lz)];
    if(id===AIR) continue;
    const col=BLOCK_COLORS[id]||{top:0xaaaaaa,side:0x888888,bot:0x666666};
    // ВАЖНО: wx,wy,wz — нижний левый угол блока (целые)
    // Блок должен занимать от wx до wx+1, т.е. центр = wx+0.5
    const wx=cx*CHUNK_SIZE+lx, wy=ly, wz=cz*CHUNK_SIZE+lz;
    const bx=wx+0.5, by=wy+0.5, bz_=wz+0.5; // центр блока

    for(const face of FACES){
      const nx=wx+face.dir[0], ny=wy+face.dir[1], nz=wz+face.dir[2];
      const nb=getBlock(nx,ny,nz);
      if(!needFace(id,nb)) continue;

      const faceCol=face.side==='top'?col.top:face.side==='bot'?col.bot:col.side;
      const r=((faceCol>>16)&0xff)/255;
      const g=((faceCol>>8)&0xff)/255;
      const b=(faceCol&0xff)/255;
      // Направленное освещение граней (как ранний Minecraft)
      const faceLight=face.side==='top'?1.0:face.side==='bot'?0.5:face.dir[0]!==0?0.72:0.80;
      // Ambient Occlusion по вершинам (алгоритм Notch, Minecraft Beta 1.8)
      const [fdx,fdy,fdz]=face.dir;
      const aoV=face.corners.map(c=>{
        const sx=(fdx===0)?Math.sign(c[0]):0;
        const sy=(fdy===0)?Math.sign(c[1]):0;
        const sz=(fdz===0)?Math.sign(c[2]):0;
        const e1=!isTrans(getBlock(wx+fdx+sx,wy+fdy+sy,wz+fdz));
        const e2=!isTrans(getBlock(wx+fdx,   wy+fdy+sy,wz+fdz+sz));
        const cr=!isTrans(getBlock(wx+fdx+sx,wy+fdy+sy,wz+fdz+sz));
        if(e1&&e2) return 0.0;
        return [1.0,0.75,0.50,0.25][e1+e2+cr];
      });
      // Анизотропное разбиение — убирает тёмные полосы
      const flip=(aoV[0]+aoV[2])<(aoV[1]+aoV[3]);
      for(let ci=0;ci<4;ci++){
        const c=face.corners[ci];
        const light=faceLight*aoV[ci];
        positions.push(bx+c[0],by+c[1],bz_+c[2]);
        colors.push(r*light,g*light,b*light);
      }
      if(!flip) indices.push(vi,vi+1,vi+2,vi,vi+2,vi+3);
      else      indices.push(vi+1,vi+2,vi+3,vi,vi+1,vi+3);
      vi+=4;
    }
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
  geo.setIndex(indices);
  // MeshBasicMaterial — без освещения, цвета ровные как в MC
  const mat=new THREE.MeshBasicMaterial({vertexColors:true});
  return new THREE.Mesh(geo,mat);
}

function rebuildChunk(cx, cz){
  const k=chunkKey(cx,cz);
  if(chunkMeshes[k]){
    scene.remove(chunkMeshes[k]);
    chunkMeshes[k].geometry.dispose();
    chunkMeshes[k].material.dispose();
    delete chunkMeshes[k];
  }
  if(!chunks[k]) return;
  const mesh=buildChunkMesh(cx,cz);
  chunkMeshes[k]=mesh;
  scene.add(mesh);
}

function updateChunks(px, pz){
  const pcx=Math.floor(px/CHUNK_SIZE), pcz=Math.floor(pz/CHUNK_SIZE);
  // Generate & build needed chunks
  for(let dcx=-RENDER_DIST;dcx<=RENDER_DIST;dcx++){
    for(let dcz=-RENDER_DIST;dcz<=RENDER_DIST;dcz++){
      const cx=pcx+dcx, cz=pcz+dcz;
      const k=chunkKey(cx,cz);
      if(!chunkMeshes[k]){
        if(!chunks[k]) generateChunk(cx,cz);
        const mesh=buildChunkMesh(cx,cz);
        chunkMeshes[k]=mesh;
        scene.add(mesh);
      }
    }
  }
  // Remove far chunks
  for(const k of Object.keys(chunkMeshes)){
    const [cx,cz]=k.split(',').map(Number);
    if(Math.abs(cx-pcx)>RENDER_DIST+1||Math.abs(cz-pcz)>RENDER_DIST+1){
      scene.remove(chunkMeshes[k]);
      chunkMeshes[k].geometry.dispose();
      chunkMeshes[k].material.dispose();
      delete chunkMeshes[k];
      // Also free chunk data
      if(chunks[k]) delete chunks[k];
    }
  }
}

// ══════════════════════════════════════════════
//  PLAYER
// ══════════════════════════════════════════════
const player = {
  x: 8, y: 20, z: 8,
  vx: 0, vy: 0, vz: 0,
  yaw: 0,   // horizontal angle
  pitch: 0, // vertical angle
  onGround: false,
  alive: true,
};

function findSpawnY(x, z){
  for(let y=WORLD_HEIGHT-1;y>=0;y--){
    if(getBlock(Math.floor(x),y,Math.floor(z))!==AIR) return y+1;
  }
  return SEA_LEVEL+2;
}

function initPlayer(){
  // Make sure spawn chunks generated
  getChunk(0,0); getChunk(-1,0); getChunk(0,-1); getChunk(-1,-1);
  player.x=8; player.z=8;
  player.y=findSpawnY(player.x, player.z)+0.1;
  player.vy=0; player.vx=0; player.vz=0;
  player.yaw=0; player.pitch=0;
  player.onGround=false;
}

// AABB collision: player is 0.6 wide, PLAYER_H tall
const PW = 0.3; // half-width
function testAABB(x,y,z){
  // Check if player box at position overlaps any solid block
  const x0=Math.floor(x-PW), x1=Math.floor(x+PW);
  const y0=Math.floor(y), y1=Math.floor(y+PLAYER_H-0.01);
  const z0=Math.floor(z-PW), z1=Math.floor(z+PW);
  for(let bx=x0;bx<=x1;bx++)
  for(let by=y0;by<=y1;by++)
  for(let bz=z0;bz<=z1;bz++){
    const id=getBlock(bx,by,bz);
    if(id!==AIR&&id!==WATER&&id!==GLASS) return true;
  }
  return false;
}

function updatePlayer(dt){
  // Three.js camera rotation.y=yaw, rotation.order='YXZ':
  // forward = (-sin(yaw), 0, -cos(yaw))
  // right   = ( cos(yaw), 0, -sin(yaw))
  const fwd=input.fwd, str=input.str;
  const sinY=Math.sin(player.yaw), cosY=Math.cos(player.yaw);
  const mx=(-sinY*fwd + cosY*str)*MOVE_SPEED;
  const mz=(-cosY*fwd - sinY*str)*MOVE_SPEED;

  // Apply gravity
  player.vy -= GRAVITY*dt;

  // Jump
  if(input.jumpPressed && player.onGround){
    player.vy = JUMP_VEL;
    player.onGround = false;
  }
  input.jumpPressed = false;

  // Move X
  player.x += mx*dt;
  if(testAABB(player.x, player.y, player.z)){
    player.x -= mx*dt;
  }
  // Move Z
  player.z += mz*dt;
  if(testAABB(player.x, player.y, player.z)){
    player.z -= mz*dt;
  }
  // Move Y
  const oldY=player.y;
  player.y += player.vy*dt;
  if(testAABB(player.x, player.y, player.z)){
    if(player.vy<=0){
      // Snap down: find exact floor position by stepping back up
      player.y=oldY;
      // Step down in small increments to find floor
      const step=0.02;
      const dist=Math.abs(player.vy*dt);
      for(let d=step;d<=dist+step;d+=step){
        const ty=oldY-d;
        if(testAABB(player.x, ty, player.z)){
          player.y=ty+step; break;
        }
        player.y=ty;
      }
      player.onGround=true;
    } else {
      // Hit ceiling
      player.y=oldY;
    }
    player.vy=0;
  } else {
    // Check if still on ground (for walking off edges)
    const belowY=player.y-0.05;
    if(!testAABB(player.x, belowY, player.z)){
      player.onGround=false;
    }
  }

  // Clamp
  if(player.y<0){player.y=0;player.vy=0;player.onGround=true;}
  if(player.y>WORLD_HEIGHT){player.y=WORLD_HEIGHT;player.vy=0;}
}

// ══════════════════════════════════════════════
//  RAYCASTING (block selection)
// ══════════════════════════════════════════════
let targetBlock=null, targetFace=null;

function castRay(){
  const dir=new THREE.Vector3(
    Math.cos(player.pitch)*(-Math.sin(player.yaw)),
    Math.sin(player.pitch),
    Math.cos(player.pitch)*(-Math.cos(player.yaw))
  );
  let rx=player.x, ry=player.y+PLAYER_EYE, rz=player.z;
  const step=0.05;
  let prevBlock=null;
  for(let i=0;i<REACH/step;i++){
    const bx=Math.floor(rx), by=Math.floor(ry), bz=Math.floor(rz);
    const id=getBlock(bx,by,bz);
    if(id!==AIR&&id!==WATER){
      targetBlock={x:bx,y:by,z:bz};
      targetFace=prevBlock?{x:prevBlock.x,y:prevBlock.y,z:prevBlock.z}:null;
      highlight.position.set(bx+0.5,by+0.5,bz+0.5);
      highlight.visible=true;
      return;
    }
    prevBlock={x:bx,y:by,z:bz};
    rx+=dir.x*step; ry+=dir.y*step; rz+=dir.z*step;
  }
  targetBlock=null; targetFace=null;
  highlight.visible=false;
}

function breakBlock(){
  if(!targetBlock) return;
  setBlock(targetBlock.x,targetBlock.y,targetBlock.z,AIR);
  showMsg('Блок сломан');
}

function placeBlock(){
  if(!targetFace) return;
  const id=HOTBAR_BLOCKS[selectedSlot];
  const px=Math.floor(player.x), pz=Math.floor(player.z);
  const py0=Math.floor(player.y), py1=Math.floor(player.y+PLAYER_H-0.01);
  // Don't place inside player
  if(targetFace.x===px&&targetFace.z===pz&&targetFace.y>=py0&&targetFace.y<=py1) return;
  setBlock(targetFace.x,targetFace.y,targetFace.z,id);
  showMsg('Блок поставлен');
}

// ══════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════
const input = {
  fwd:0, str:0,
  jumpPressed:false,
  lookDX:0, lookDY:0,
};

// ── Hotbar selection
document.querySelectorAll('.hslot').forEach(el=>{
  el.addEventListener('touchstart',e=>{
    e.preventDefault(); e.stopPropagation();
    selectSlot(+el.dataset.idx);
  },{passive:false});
  el.addEventListener('click',e=>{
    e.stopPropagation();
    selectSlot(+el.dataset.idx);
  });
});
function selectSlot(i){
  document.getElementById('hs'+selectedSlot).classList.remove('active');
  selectedSlot=i;
  document.getElementById('hs'+selectedSlot).classList.add('active');
}

// ── Touch joystick (left pad = movement)
let joyActive=false, joyId=-1, joyX0=0, joyY0=0;
const joyEl=document.getElementById('joy-l');
const joyDot=document.getElementById('joy-l-dot');
const lpad=document.getElementById('lpad');

lpad.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  joyActive=true; joyId=t.identifier;
  joyX0=t.clientX; joyY0=t.clientY;
  joyEl.style.display='block';
  joyEl.style.left=t.clientX+'px';
  joyEl.style.top=t.clientY+'px';
},{passive:false});
lpad.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==joyId) continue;
    const dx=t.clientX-joyX0, dy=t.clientY-joyY0;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const norm=Math.min(len,45);
    input.fwd=-dy/len*Math.min(norm,45)/45;
    input.str=dx/len*Math.min(norm,45)/45;
    const px=clamp(dx,-40,40), py=clamp(dy,-40,40);
    joyDot.style.left=(27+px)+'px';
    joyDot.style.top=(27+py)+'px';
  }
},{passive:false});
lpad.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==joyId) continue;
    joyActive=false; joyId=-1;
    input.fwd=0; input.str=0;
    joyEl.style.display='none';
    joyDot.style.left='27px'; joyDot.style.top='27px';
  }
},{passive:false});
lpad.addEventListener('touchcancel',e=>{
  joyActive=false; joyId=-1; input.fwd=0; input.str=0;
  joyEl.style.display='none';
},{passive:false});

// ── Touch look (right pad = drag-to-look)
let rpadId=-1, rpadLastX=0, rpadLastY=0;
const rpad=document.getElementById('rpad');
rpad.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  rpadId=t.identifier; rpadLastX=t.clientX; rpadLastY=t.clientY;
},{passive:false});
rpad.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==rpadId) continue;
    input.lookDX+=t.clientX-rpadLastX;
    input.lookDY+=t.clientY-rpadLastY;
    rpadLastX=t.clientX; rpadLastY=t.clientY;
  }
},{passive:false});
rpad.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){if(t.identifier===rpadId) rpadId=-1;}
},{passive:false});
rpad.addEventListener('touchcancel',()=>{rpadId=-1;},{passive:false});

// ── Buttons
function addBtn(id, onDown, onUp){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();onDown();},{passive:false});
  if(onUp) el.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();onUp();},{passive:false});
  el.addEventListener('mousedown',e=>{e.stopPropagation();onDown();});
  if(onUp) el.addEventListener('mouseup',e=>{e.stopPropagation();onUp();});
  if(!onUp) el.addEventListener('click',e=>{e.stopPropagation();onDown();});
}
addBtn('btn-break', ()=>{ breakBlock(); });
addBtn('btn-place', ()=>{ placeBlock(); });
addBtn('btn-jump',  ()=>{ input.jumpPressed=true; });
addBtn('btn-back',  ()=>{ showMenu(); });

// ── PC controls
const keys={};
let pcMouseDown=false, pcLastX=0, pcLastY=0, pointerLocked=false;

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault();input.jumpPressed=true;}
  if(e.code==='KeyE'){placeBlock();}
  if(e.code==='KeyF'){breakBlock();}
  const digits={'Digit1':0,'Digit2':1,'Digit3':2,'Digit4':3,'Digit5':4,'Digit6':5,'Digit7':6};
  if(digits[e.code]!==undefined) selectSlot(digits[e.code]);
});
document.addEventListener('keyup',e=>{ delete keys[e.code]; });

// Mouse drag — works on the whole canvas, no pointer lock required
canvas.addEventListener('mousedown',e=>{
  if(e.button===2){placeBlock(); return;}
  pcMouseDown=true; pcLastX=e.clientX; pcLastY=e.clientY;
  // Also try to get pointer lock for smoother look
  canvas.requestPointerLock&&canvas.requestPointerLock();
});
document.addEventListener('mouseup',()=>{ pcMouseDown=false; });
document.addEventListener('mousemove',e=>{
  if(pointerLocked){
    // Pointer lock: use movementX/Y directly
    input.lookDX += e.movementX;
    input.lookDY += e.movementY;
  } else if(pcMouseDown){
    // Drag mode: delta from last frame
    input.lookDX += e.clientX - pcLastX;
    input.lookDY += e.clientY - pcLastY;
    pcLastX=e.clientX; pcLastY=e.clientY;
  }
});
document.addEventListener('pointerlockchange',()=>{
  pointerLocked=!!document.pointerLockElement;
  if(pointerLocked) pcMouseDown=false;
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

function applyPCKeys(){
  const fwd=(keys.KeyW||keys.ArrowUp)?1:(keys.KeyS||keys.ArrowDown)?-1:0;
  const str=(keys.KeyD||keys.ArrowRight)?1:(keys.KeyA||keys.ArrowLeft)?-1:0;
  if(!joyActive){input.fwd=fwd; input.str=str;}
}

function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v;}

// ══════════════════════════════════════════════
//  LOOK SENSITIVITY
// ══════════════════════════════════════════════
const LOOK_SENS_PL   = 0.0018; // pointer lock (movementX = pixels, usually 1-3px/frame)
const LOOK_SENS_DRAG = 0.004;  // drag / touch (clientX delta = larger, needs higher divisor)

function applyLook(){
  // lookDX/DY accumulate from either pointer lock (small) or drag (large)
  // We tag which mode we're in via a separate accumulator
  player.yaw   -= input.lookDX * (pointerLocked ? LOOK_SENS_PL : LOOK_SENS_DRAG);
  player.pitch -= input.lookDY * (pointerLocked ? LOOK_SENS_PL : LOOK_SENS_DRAG);
  player.pitch  = clamp(player.pitch, -Math.PI/2+0.05, Math.PI/2-0.05);
  input.lookDX=0; input.lookDY=0;
}

// ══════════════════════════════════════════════
//  HUD UPDATE
// ══════════════════════════════════════════════
let msgTimer=0;
function showMsg(txt){
  const el=document.getElementById('msg');
  el.textContent=txt; el.classList.add('show');
  msgTimer=2;
}

function updateCamera(){
  camera.position.set(player.x, player.y+PLAYER_EYE, player.z);
  camera.rotation.order='YXZ';
  camera.rotation.y=player.yaw;
  camera.rotation.x=player.pitch;
}

// ══════════════════════════════════════════════
//  MENU
// ══════════════════════════════════════════════
let running=false;
const menuDiv=document.createElement('div');
menuDiv.id='menu';
menuDiv.innerHTML=`
<div style="position:fixed;inset:0;z-index:100;background:linear-gradient(180deg,#1a8a1a 0%,#3a5a1a 40%,#5a4020 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px">
  <div style="font-size:60px;font-weight:900;color:#fff;text-shadow:4px 4px 0 #2d5a2d,0 0 30px rgba(0,200,0,0.4);
    letter-spacing:4px;font-family:'Courier New',monospace">MINECRAFT</div>
  <div style="color:#aaffaa;font-size:13px;letter-spacing:.1em;font-family:'Courier New',monospace">МОБИЛЬНАЯ ВЕРСИЯ</div>
  <button id="btn-play" style="background:linear-gradient(135deg,#2a7a2a,#4aaa4a);border:2px solid #88ff88;
    color:#fff;font-size:20px;font-weight:900;padding:14px 48px;cursor:pointer;
    font-family:'Courier New',monospace;letter-spacing:.1em;border-radius:4px">
    ▶ ИГРАТЬ
  </button>
  <div style="color:#88cc88;font-size:11px;font-family:'Courier New',monospace;text-align:center;max-width:280px;line-height:1.7">
    ПК: WASD = движение, мышь = камера<br>
    F = сломать, E = поставить блок<br>
    Телефон: джойстик + кнопки
  </div>
</div>`;
document.body.appendChild(menuDiv);
document.getElementById('btn-play').addEventListener('click', startGame);
document.getElementById('btn-play').addEventListener('touchstart',e=>{e.preventDefault();startGame();},{passive:false});

function startGame(){
  menuDiv.style.display='none';
  document.getElementById('ctrl').style.display='block';
  // Generate initial chunks and find player Y
  initPlayer();
  updateChunks(player.x, player.z);
  // Re-find Y after chunks generated
  player.y=findSpawnY(player.x, player.z)+0.1;
  running=true;
  showMsg('Нажмите на экран для управления мышью');
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

function showMenu(){
  running=false;
  menuDiv.style.display='block';
  document.getElementById('ctrl').style.display='none';
  window.parent.postMessage({type:'gameClose',game:'minecraft'},'*');
}

// ══════════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════════
let lastTime=0;
let frameTick=0;

function gameLoop(ts){
  if(!running) return;
  requestAnimationFrame(gameLoop);

  const dt=Math.min((ts-lastTime)/1000, 0.05);
  lastTime=ts;
  frameTick++;

  applyPCKeys();
  applyLook();
  updatePlayer(dt);

  // Update chunks every 30 frames
  if(frameTick%30===0) updateChunks(player.x, player.z);

  // Raycast every frame for highlight
  castRay();

  updateCamera();

  // Arm swing
  arm.rotation.x=Math.sin(Date.now()*0.008)*0.15;

  // Message
  if(msgTimer>0){
    msgTimer-=dt;
    if(msgTimer<=0) document.getElementById('msg').classList.remove('show');
  }

  renderer.render(scene, camera);
}

// ══════════════════════════════════════════════
//  RESIZE
// ══════════════════════════════════════════════
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

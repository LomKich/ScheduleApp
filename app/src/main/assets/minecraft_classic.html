<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Minecraft Classic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#87CEEB;overflow:hidden;touch-action:none}

/* Main webview container */
#mc-frame{
  position:fixed;inset:0;width:100%;height:100%;
  border:none;display:block;
}

/* Mobile overlay controls — on top of the webview */
#ctrl-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:999;
}

/* Left joystick zone */
#lpad{
  position:absolute;left:0;bottom:0;width:44%;height:55%;
  pointer-events:all;touch-action:none;
}
#lpad::after{
  content:'🕹';position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  font-size:18px;opacity:0.4;pointer-events:none;
}
/* Virtual joystick ring */
.vjoy{
  position:absolute;width:90px;height:90px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.12);
  transform:translate(-50%,-50%);pointer-events:none;display:none;
}
.vjoy-dot{
  position:absolute;width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.5);top:27px;left:27px;pointer-events:none;
}

/* Right look zone */
#rpad{
  position:absolute;right:0;top:0;width:56%;height:65%;
  pointer-events:all;touch-action:none;
}
#rpad::after{
  content:'👆 LOOK';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font-size:10px;color:rgba(255,255,255,0.3);pointer-events:none;
  font-family:monospace;
}

/* Action buttons */
.btn{
  position:absolute;border-radius:50%;pointer-events:all;touch-action:none;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:20px;border:3px solid;cursor:pointer;
  user-select:none;-webkit-user-select:none;
}
#btn-jump{
  right:18px;bottom:190px;width:62px;height:62px;
  background:rgba(50,100,220,0.88);border-color:#6699ff;color:#fff;
  font-size:14px;
}
#btn-break{
  right:100px;bottom:130px;width:60px;height:60px;
  background:rgba(200,60,0,0.88);border-color:#ff6600;color:#fff;
  font-size:22px;
}
#btn-place{
  right:20px;bottom:110px;width:52px;height:52px;
  background:rgba(0,140,0,0.85);border-color:#00ff44;color:#fff;
  font-size:14px;
}
#btn-sneak{
  right:105px;bottom:220px;width:48px;height:48px;
  background:rgba(120,80,0,0.85);border-color:#cc8800;color:#fff;
  font-size:11px;
}

/* Back button */
#btn-back{
  position:absolute;left:10px;top:10px;width:40px;height:40px;
  border-radius:50%;background:rgba(0,0,0,0.55);border:2px solid #666;
  color:#ccc;font-size:20px;pointer-events:all;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}

/* Hotbar scroll buttons */
#btn-prev-slot{
  position:absolute;left:18px;bottom:190px;width:46px;height:46px;
  border-radius:50%;background:rgba(0,0,0,0.6);border:2px solid #777;
  color:#fff;font-size:18px;pointer-events:all;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
#btn-next-slot{
  position:absolute;left:18px;bottom:130px;width:46px;height:46px;
  border-radius:50%;background:rgba(0,0,0,0.6);border:2px solid #777;
  color:#fff;font-size:18px;pointer-events:all;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}

/* Keyboard simulator helper */
#keyboard-layer{display:none}

/* No iframe warning */
#no-iframe{
  position:fixed;inset:0;background:linear-gradient(180deg,#1a4a8a 0%,#0a0f2a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:24px;text-align:center;z-index:2000;
  font-family:'Courier New',monospace;
}
#no-iframe h1{color:#7fcfff;font-size:28px;font-weight:900;text-shadow:0 0 20px rgba(127,207,255,0.5)}
#no-iframe p{color:#a0c4ff;font-size:13px;line-height:1.7;max-width:280px}
.mc-btn{
  background:linear-gradient(135deg,#2a6a2a,#4aaa4a);border:2px solid #88ff88;
  color:#fff;font-size:15px;font-weight:700;padding:12px 32px;cursor:pointer;
  font-family:'Courier New',monospace;border-radius:4px;
}
.mc-btn-secondary{
  background:rgba(255,255,255,0.1);border:1px solid #555;
  color:#aaa;font-size:12px;padding:8px 20px;cursor:pointer;
  font-family:'Courier New',monospace;border-radius:4px;
}
</style>
</head>
<body>

<!-- Minecraft Classic loaded in iframe (might be blocked by X-Frame-Options) -->
<iframe id="mc-frame" src="https://classic.minecraft.net/" 
  sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-top-navigation"
  allow="pointer-lock;autoplay"></iframe>

<!-- Mobile control overlay -->
<div id="ctrl-overlay">
  <div id="lpad"></div>
  <div class="vjoy" id="joy-l"><div class="vjoy-dot" id="joy-dot"></div></div>
  <div id="rpad"></div>

  <div class="btn" id="btn-jump">⬆<br><span style="font-size:9px">JUMP</span></div>
  <div class="btn" id="btn-break">⛏</div>
  <div class="btn" id="btn-place"><span style="font-size:11px">PLACE</span></div>
  <div class="btn" id="btn-sneak"><span style="font-size:10px">SHIFT</span></div>
  <div id="btn-prev-slot">‹</div>
  <div id="btn-next-slot">›</div>
  <div id="btn-back" onclick="goBack()">✕</div>
</div>

<!-- Fallback: shown if iframe is blocked -->
<div id="no-iframe" style="display:none">
  <h1>⛏ MINECRAFT</h1>
  <p>К сожалению, Classic Minecraft не позволяет встраивать себя в другие приложения.<br><br>Нажми кнопку ниже чтобы открыть игру в браузере телефона.</p>
  <button class="mc-btn" onclick="openExternal()">🌐 Открыть в браузере</button>
  <button class="mc-btn-secondary" onclick="goBack()">← Назад</button>
  <p style="font-size:11px;color:#667;margin-top:8px">Совет: в браузере Chrome игра работает полностью. После запуска запомни управление: WASD — движение, мышь — камера.</p>
</div>

<script>
'use strict';

// Check if iframe was blocked
const frame = document.getElementById('mc-frame');
frame.addEventListener('load', () => {
  // If we can access contentDocument, iframe loaded
  try {
    const doc = frame.contentDocument;
    if (!doc || doc.URL === 'about:blank') throw new Error('blocked');
    // Inject touch-to-keyboard bridge
    setTimeout(injectControls, 1000);
  } catch(e) {
    // Iframe blocked
    document.getElementById('no-iframe').style.display = 'flex';
    document.getElementById('ctrl-overlay').style.display = 'none';
  }
});
frame.addEventListener('error', () => {
  document.getElementById('no-iframe').style.display = 'flex';
  document.getElementById('ctrl-overlay').style.display = 'none';
});

// ══ KEY SIMULATION ══
const WIN = frame.contentWindow;

function simKey(keyCode, key, down) {
  if (!WIN) return;
  const type = down ? 'keydown' : 'keyup';
  try {
    const e = new KeyboardEvent(type, {
      keyCode, key, which: keyCode,
      bubbles: true, cancelable: true
    });
    WIN.document.dispatchEvent(e);
    WIN.dispatchEvent(e);
  } catch(e2) {}
}

function simMouse(dx, dy) {
  if (!WIN) return;
  try {
    const e = new MouseEvent('mousemove', {
      movementX: dx, movementY: dy,
      bubbles: true, cancelable: true
    });
    WIN.document.dispatchEvent(e);
  } catch(e2) {}
}

function simClick(btn) {
  if (!WIN) return;
  try {
    ['mousedown','mouseup','click'].forEach(t => {
      WIN.document.dispatchEvent(new MouseEvent(t, {button: btn, bubbles:true}));
    });
  } catch(e) {}
}

// ══ LEFT PAD - Movement ══
let joyActive = false, joyId = -1, joyX0 = 0, joyY0 = 0;
let pressedKeys = new Set();
const lpad = document.getElementById('lpad');
const joy = document.getElementById('joy-l');
const joyDot = document.getElementById('joy-dot');

function setKey(code, key, on) {
  if (on && !pressedKeys.has(code)) { pressedKeys.add(code); simKey(code, key, true); }
  if (!on && pressedKeys.has(code)) { pressedKeys.delete(code); simKey(code, key, false); }
}

function updateJoy(dx, dy) {
  const deadzone = 12;
  const norm = Math.sqrt(dx*dx + dy*dy);
  setKey(87, 'w', dy < -deadzone); // W forward
  setKey(83, 's', dy > deadzone);  // S back
  setKey(65, 'a', dx < -deadzone); // A left
  setKey(68, 'd', dx > deadzone);  // D right
  // update visual
  const px = Math.max(-40, Math.min(40, dx));
  const py = Math.max(-40, Math.min(40, dy));
  joy.style.left = joyX0 + 'px';
  joy.style.top = joyY0 + 'px';
  joyDot.style.left = (27 + px) + 'px';
  joyDot.style.top = (27 + py) + 'px';
}

lpad.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  joyActive = true; joyId = t.identifier;
  joyX0 = t.clientX; joyY0 = t.clientY;
  joy.style.display = 'block';
  // Focus iframe first
  try { WIN.focus(); frame.contentDocument.body.click(); } catch(e2) {}
}, {passive:false});
lpad.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== joyId) continue;
    updateJoy(t.clientX - joyX0, t.clientY - joyY0);
  }
}, {passive:false});
lpad.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== joyId) continue;
    joyActive = false; joyId = -1;
    joy.style.display = 'none';
    joyDot.style.left = '27px'; joyDot.style.top = '27px';
    setKey(87,'w',false); setKey(83,'s',false); setKey(65,'a',false); setKey(68,'d',false);
  }
}, {passive:false});

// ══ RIGHT PAD - Look ══
let rId = -1, rLX = 0, rLY = 0;
const LOOK_SENS = 3;
const rpad = document.getElementById('rpad');

rpad.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  rId = t.identifier; rLX = t.clientX; rLY = t.clientY;
  try { WIN.focus(); } catch(e2) {}
}, {passive:false});
rpad.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== rId) continue;
    simMouse((t.clientX - rLX) * LOOK_SENS, (t.clientY - rLY) * LOOK_SENS);
    rLX = t.clientX; rLY = t.clientY;
  }
}, {passive:false});
rpad.addEventListener('touchend', e => {
  for (const t of e.changedTouches) if (t.identifier === rId) rId = -1;
}, {passive:false});

// ══ ACTION BUTTONS ══
function addBtn(id, keyCode, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    simKey(keyCode, key, true);
  }, {passive:false});
  el.addEventListener('touchend', e => {
    e.preventDefault(); e.stopPropagation();
    simKey(keyCode, key, false);
  }, {passive:false});
}

// Jump = Space
document.getElementById('btn-jump').addEventListener('touchstart', e => {
  e.preventDefault();
  simKey(32, ' ', true);
}, {passive:false});
document.getElementById('btn-jump').addEventListener('touchend', e => {
  e.preventDefault();
  simKey(32, ' ', false);
}, {passive:false});

// Break = Left click
document.getElementById('btn-break').addEventListener('touchstart', e => {
  e.preventDefault();
  try { WIN.document.dispatchEvent(new MouseEvent('mousedown',{button:0,bubbles:true})); } catch(e2){}
}, {passive:false});
document.getElementById('btn-break').addEventListener('touchend', e => {
  e.preventDefault();
  try { WIN.document.dispatchEvent(new MouseEvent('mouseup',{button:0,bubbles:true})); } catch(e2){}
}, {passive:false});

// Place = Right click
document.getElementById('btn-place').addEventListener('touchstart', e => {
  e.preventDefault();
  try { WIN.document.dispatchEvent(new MouseEvent('mousedown',{button:2,bubbles:true})); } catch(e2){}
}, {passive:false});
document.getElementById('btn-place').addEventListener('touchend', e => {
  e.preventDefault();
  try { WIN.document.dispatchEvent(new MouseEvent('mouseup',{button:2,bubbles:true})); } catch(e2){}
}, {passive:false});

// Sneak = Shift
addBtn('btn-sneak', 16, 'Shift');

// Slot navigation (E = inventory, scroll emulation)
let currentSlot = 1;
document.getElementById('btn-prev-slot').addEventListener('touchstart', e => {
  e.preventDefault();
  currentSlot = Math.max(1, currentSlot - 1);
  simKey(48 + currentSlot, '' + currentSlot, true);
  setTimeout(() => simKey(48 + currentSlot, '' + currentSlot, false), 50);
}, {passive:false});
document.getElementById('btn-next-slot').addEventListener('touchstart', e => {
  e.preventDefault();
  currentSlot = Math.min(9, currentSlot + 1);
  simKey(48 + currentSlot, '' + currentSlot, true);
  setTimeout(() => simKey(48 + currentSlot, '' + currentSlot, false), 50);
}, {passive:false});

// Inject pointer lock request into iframe
function injectControls() {
  try {
    const canvas = WIN.document.querySelector('canvas');
    if (canvas) {
      canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        canvas.requestPointerLock && canvas.requestPointerLock();
      }, {passive:false});
    }
  } catch(e) {}
}

function goBack() {
  window.parent.postMessage({ type: 'gameClose', game: 'minecraft' }, '*');
}

function openExternal() {
  if (window.Android && window.Android.openUrl) {
    window.Android.openUrl('https://classic.minecraft.net/');
  } else {
    window.open('https://classic.minecraft.net/', '_blank');
  }
}
</script>
</body>
</html>

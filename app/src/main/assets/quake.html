<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>QUAKE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'Courier New',monospace}
#c{display:block;width:100%;height:100%;position:fixed;top:0;left:0}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,200,100,0.85)}
#crosshair::before{top:50%;left:0;width:100%;height:2px;margin-top:-1px}
#crosshair::after{left:50%;top:0;height:100%;width:2px;margin-left:-1px}

#hud-bottom{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.85));
  padding:8px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid #5a3a00;
}
.hud-block{display:flex;flex-direction:column;align-items:center;min-width:60px}
.hud-label{font-size:9px;color:#aa7700;letter-spacing:.15em;text-transform:uppercase;font-weight:700}
.hud-val{font-size:26px;font-weight:900;color:#ff9900;line-height:1.1;text-shadow:0 0 8px #ff6600}
.hud-val.low{color:#ff2200;animation:pulse .4s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.4}}
#hud-weapon{font-size:10px;color:#cc9933;text-align:center;font-weight:700;letter-spacing:.05em}
#hud-face{font-size:32px;line-height:1;filter:drop-shadow(0 0 4px #f80)}
#dmg-flash{position:absolute;inset:0;background:rgba(200,0,0,0);pointer-events:none;transition:background .1s}
#dmg-flash.hit{background:rgba(200,0,0,0.35)}
#pickup-msg{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);
  color:#ff9900;font-size:18px;font-weight:700;text-shadow:1px 1px 0 #000,0 0 12px #f80;
  opacity:0;transition:opacity .3s;pointer-events:none;text-align:center}
#pickup-msg.show{opacity:1}

/* ── Menu / start screen ── */
#menu{
  position:fixed;inset:0;z-index:100;
  background:radial-gradient(ellipse at center,#1a0a00 0%,#000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
#menu h1{
  font-size:72px;font-weight:900;color:#ff6600;
  text-shadow:0 0 30px #ff4400,0 0 60px #ff2200,2px 2px 0 #000;
  letter-spacing:.1em;line-height:1
}
#menu p{color:#aa7700;font-size:14px;letter-spacing:.1em;text-align:center;max-width:300px;line-height:1.6}
#btn-start{
  background:linear-gradient(135deg,#8b4000,#cc6600);
  border:2px solid #ff9900;color:#fff;
  font-size:20px;font-weight:900;letter-spacing:.1em;
  padding:14px 40px;cursor:pointer;
  box-shadow:0 0 20px rgba(255,100,0,0.5);
  font-family:'Courier New',monospace;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
#btn-start:active{transform:scale(.97)}
#menu-credits{color:#554433;font-size:10px;margin-top:10px;letter-spacing:.05em}

/* ── Death screen ── */
#death-screen{
  position:fixed;inset:0;z-index:90;
  background:rgba(120,0,0,0.7);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
#death-screen h2{color:#ff3300;font-size:48px;font-weight:900;text-shadow:0 0 20px #f00;letter-spacing:.1em}
#death-screen p{color:#ffaa00;font-size:16px}
#btn-respawn{
  background:#440000;border:2px solid #ff3300;color:#ff9900;
  font-size:18px;font-weight:700;padding:12px 36px;cursor:pointer;
  font-family:'Courier New',monospace;
}

/* ── Touch Controls ── */
#ctrl{position:fixed;inset:0;z-index:30;pointer-events:none}
#lpad{position:absolute;left:0;bottom:0;width:48%;height:55%;pointer-events:all;opacity:0}
#rpad{position:absolute;right:0;top:0;width:52%;height:60%;pointer-events:all;opacity:0;touch-action:none}
.vjoy{
  position:absolute;border-radius:50%;pointer-events:none;display:none;
  width:90px;height:90px;margin:-45px;
  border:2px solid rgba(255,150,0,0.4);background:rgba(255,100,0,0.08);
}
.vdot{position:absolute;border-radius:50%;pointer-events:none;
  width:36px;height:36px;top:27px;left:27px;background:rgba(255,150,0,0.5)}
.btn{
  position:absolute;pointer-events:all;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;touch-action:none;
  font-weight:900;cursor:pointer;transition:transform .08s;
}
.btn:active{transform:scale(.88)}
#btn-fire{
  right:16px;bottom:16px;width:72px;height:72px;
  background:rgba(220,30,0,0.9);border:3px solid #ff4400;
  color:#fff;font-size:28px;
  box-shadow:0 0 20px rgba(255,50,0,0.6);
}
#btn-jump{
  right:100px;bottom:16px;width:54px;height:54px;
  background:rgba(80,80,180,0.85);border:2px solid #88aaff;
  color:#fff;font-size:22px;
}
#btn-wpn{
  right:16px;bottom:100px;width:46px;height:46px;
  background:rgba(100,80,0,0.85);border:2px solid #cc9900;
  color:#fff;font-size:13px;border-radius:10px;
}
#btn-back{
  left:12px;top:12px;width:40px;height:40px;
  background:rgba(0,0,0,0.7);border:2px solid #444;
  color:#888;font-size:22px;border-radius:50%;pointer-events:all;
  position:absolute;z-index:40;
}
</style>
</head>

<div id="menu">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ══════════════════════════════════════════════
//  AUDIO ENGINE
// ══════════════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, type, dur, vol=0.3, detune=0) {
  try {
    const osc = AC.createOscillator();
    const gain = AC.createGain();
    osc.connect(gain); gain.connect(AC.destination);
    osc.type = type; osc.frequency.value = freq;
    osc.detune.value = detune;
    gain.gain.setValueAtTime(vol, AC.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    osc.start(); osc.stop(AC.currentTime + dur);
  } catch(e){}
}

function playNoise(dur, vol=0.2, filter=800) {
  try {
    const buf = AC.createBuffer(1, AC.sampleRate * dur, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
    const src = AC.createBufferSource();
    src.buffer = buf;
    const flt = AC.createBiquadFilter();
    flt.type = 'lowpass'; flt.frequency.value = filter;
    const gain = AC.createGain();
    gain.gain.setValueAtTime(vol, AC.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
    src.connect(flt); flt.connect(gain); gain.connect(AC.destination);
    src.start(); src.stop(AC.currentTime+dur);
  } catch(e){}
}

const SFX = {
  shotgun() {
    playNoise(0.12, 0.8, 4000);
    playTone(80, 'sawtooth', 0.15, 0.4);
    playNoise(0.08, 0.6, 8000);
  },
  shotgunSuper() {
    playNoise(0.18, 0.9, 5000);
    playTone(70, 'sawtooth', 0.2, 0.5);
    setTimeout(()=>playNoise(0.1,0.5,6000),80);
  },
  nailgun() {
    playNoise(0.06, 0.5, 2000);
    playTone(300, 'square', 0.05, 0.2);
  },
  rocketlaunch() {
    playNoise(0.08, 0.7, 1200);
    playTone(120, 'sawtooth', 0.3, 0.4);
  },
  explosion() {
    playNoise(0.4, 1.0, 600);
    playTone(60, 'sawtooth', 0.4, 0.6);
    playNoise(0.3, 0.7, 300);
  },
  hit() {
    playNoise(0.08, 0.4, 3000);
    playTone(200, 'square', 0.06, 0.15);
  },
  death() {
    playNoise(0.3, 0.6, 800);
    playTone(100, 'sawtooth', 0.3, 0.3);
    playTone(80, 'sawtooth', 0.5, 0.2);
  },
  pickup() {
    playTone(660, 'sine', 0.1, 0.3);
    playTone(880, 'sine', 0.1, 0.3);
    setTimeout(()=>playTone(1100,'sine',0.15,0.25),120);
  },
  jump() {
    playNoise(0.05, 0.15, 1500);
    playTone(180,'square',0.08,0.1);
  },
  step() {
    playNoise(0.04, 0.08, 600);
  },
  pain() {
    playNoise(0.12, 0.4, 1000);
    playTone(220,'sawtooth',0.1,0.2);
  }
};

// ══════════════════════════════════════════════
//  THREE.JS SETUP
// ══════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.shadowMap.enabled = false;
renderer.setClearColor(0x1a0a00);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x1a0a00, 8, 35);

const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 60);
camera.position.set(0, 1.7, 0);

// Lighting
const ambient = new THREE.AmbientLight(0x331a00, 0.6);
scene.add(ambient);

// ══════════════════════════════════════════════
//  MATERIALS / TEXTURES
// ══════════════════════════════════════════════
function mkTex(fn) {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  fn(c.getContext('2d'));
  const t = new THREE.CanvasTexture(c);
  t.magFilter = THREE.NearestFilter;
  t.minFilter = THREE.NearestFilter;
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}
function rnd(x,y){const v=Math.sin(x*374.761+y*668.265)*43758.5453;return v-Math.floor(v);}

const TEX = {
  stone: mkTex(ctx=>{
    for(let y=0;y<64;y++) for(let x=0;x<64;x++){
      const n=rnd(x,y); const b=90+Math.floor(n*50);
      // Stone brick lines
      const bx=Math.floor(x/16), by=Math.floor(y/16);
      const lx=(x%16<1)||(x%16>14), ly=(y%16<1)||(y%16>14);
      const inLine=(bx%2===0)?ly:lx||ly;
      const c2=inLine?40:b;
      ctx.fillStyle=`rgb(${c2},${c2},${Math.floor(c2*0.9)})`;
      ctx.fillRect(x,y,1,1);
    }
  }),
  floor: mkTex(ctx=>{
    for(let y=0;y<64;y++) for(let x=0;x<64;x++){
      const n=rnd(x+200,y+200); const b=70+Math.floor(n*40);
      const tile=(Math.floor(x/16)+Math.floor(y/16))%2;
      const f=tile?b:b*0.7;
      ctx.fillStyle=`rgb(${Math.floor(f*0.9)},${Math.floor(f*0.7)},${Math.floor(f*0.5)})`;
      ctx.fillRect(x,y,1,1);
    }
  }),
  ceiling: mkTex(ctx=>{
    for(let y=0;y<64;y++) for(let x=0;x<64;x++){
      const n=rnd(x+400,y+400); const b=50+Math.floor(n*30);
      ctx.fillStyle=`rgb(${b},${Math.floor(b*0.8)},${Math.floor(b*0.6)})`;
      ctx.fillRect(x,y,1,1);
    }
  }),
  metal: mkTex(ctx=>{
    for(let y=0;y<64;y++) for(let x=0;x<64;x++){
      const n=rnd(x+600,y); const b=80+Math.floor(n*60);
      const stripe=Math.floor(y/8)%2;
      const f=stripe?b:b*1.2;
      ctx.fillStyle=`rgb(${Math.floor(f*0.8)},${Math.floor(f*0.7)},${Math.floor(f*0.6)})`;
      ctx.fillRect(x,y,1,1);
    }
  }),
  lava: mkTex(ctx=>{
    for(let y=0;y<64;y++) for(let x=0;x<64;x++){
      const n=rnd(x+100,y+700); const b=150+Math.floor(n*100);
      ctx.fillStyle=`rgb(${b},${Math.floor(b*0.3)},0)`;
      ctx.fillRect(x,y,1,1);
    }
  }),
};

function wallMat(tex, rep=1) {
  const m = new THREE.MeshLambertMaterial({map:tex.clone()});
  m.map.repeat.set(rep,rep);
  return m;
}
function floorMat(tex, rep=4) {
  const m = new THREE.MeshLambertMaterial({map:tex.clone()});
  m.map.repeat.set(rep,rep);
  return m;
}

// ══════════════════════════════════════════════
//  LEVEL BUILDER
// ══════════════════════════════════════════════
const WALL_H = 3.5;
const levelMeshes = [];
const colliders = []; // {min, max} AABB boxes

function addBox(x,y,z,w,h,d,mat,noCollide=false) {
  const geo = new THREE.BoxGeometry(w,h,d);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x,y,z);
  scene.add(mesh);
  levelMeshes.push(mesh);
  if(!noCollide) colliders.push({
    minX:x-w/2, maxX:x+w/2,
    minY:y-h/2, maxY:y+h/2,
    minZ:z-d/2, maxZ:z+d/2
  });
  return mesh;
}

function addRoom(cx,cz,w,d,mat,fmat,cmat) {
  const hw=w/2, hd=d/2;
  // Floor
  const fg=new THREE.PlaneGeometry(w,d);
  const fm=new THREE.MeshLambertMaterial({map:fmat.clone()});
  fm.map.repeat.set(Math.floor(w),Math.floor(d));
  const floor=new THREE.Mesh(fg,fm);
  floor.rotation.x=-Math.PI/2; floor.position.set(cx,0,cz);
  scene.add(floor); levelMeshes.push(floor);
  // Ceiling
  const cg=new THREE.PlaneGeometry(w,d);
  const cm=new THREE.MeshLambertMaterial({map:cmat.clone()});
  cm.map.repeat.set(Math.floor(w/2),Math.floor(d/2));
  const ceil=new THREE.Mesh(cg,cm);
  ceil.rotation.x=Math.PI/2; ceil.position.set(cx,WALL_H,cz);
  scene.add(ceil); levelMeshes.push(ceil);
  // Walls
  const wm=new THREE.MeshLambertMaterial({map:mat.clone()});
  wm.map.repeat.set(Math.floor(w),1.5);
  // N S
  [[-1,0],[1,0]].forEach(([sx])=>{
    const g=new THREE.PlaneGeometry(w,WALL_H);
    const m2=new THREE.MeshLambertMaterial({map:mat.clone()});
    m2.map.repeat.set(Math.floor(w/2),1);
    const mesh=new THREE.Mesh(g,m2);
    mesh.position.set(cx,WALL_H/2,cz+sx*hd);
    mesh.rotation.y=sx<0?0:Math.PI;
    scene.add(mesh); levelMeshes.push(mesh);
  });
  // E W
  [[-1,0],[1,0]].forEach(([sx])=>{
    const g=new THREE.PlaneGeometry(d,WALL_H);
    const m2=new THREE.MeshLambertMaterial({map:mat.clone()});
    m2.map.repeat.set(Math.floor(d/2),1);
    const mesh=new THREE.Mesh(g,m2);
    mesh.position.set(cx+sx*hw,WALL_H/2,cz);
    mesh.rotation.y=sx<0?Math.PI/2:-Math.PI/2;
    scene.add(mesh); levelMeshes.push(mesh);
  });
  // Invisible AABB walls
  const t=0.3;
  colliders.push({minX:cx-hw-t,maxX:cx-hw,minY:-1,maxY:WALL_H+1,minZ:cz-hd-t,maxZ:cz+hd+t});
  colliders.push({minX:cx+hw,maxX:cx+hw+t,minY:-1,maxY:WALL_H+1,minZ:cz-hd-t,maxZ:cz+hd+t});
  colliders.push({minX:cx-hw-t,maxX:cx+hw+t,minY:-1,maxY:WALL_H+1,minZ:cz-hd-t,maxZ:cz-hd});
  colliders.push({minX:cx-hw-t,maxX:cx+hw+t,minY:-1,maxY:WALL_H+1,minZ:cz+hd,maxZ:cz+hd+t});
}

function addCorridor(x1,z1,x2,z2,w) {
  const cx=(x1+x2)/2, cz=(z1+z2)/2;
  const dx=x2-x1, dz=z2-z1;
  const len=Math.sqrt(dx*dx+dz*dz);
  const angle=Math.atan2(dx,dz);
  // Floor
  const fg=new THREE.PlaneGeometry(w,len);
  const fm=new THREE.MeshLambertMaterial({map:TEX.floor.clone()});
  fm.map.repeat.set(w,Math.floor(len));
  const fl=new THREE.Mesh(fg,fm);
  fl.rotation.x=-Math.PI/2; fl.rotation.z=angle;
  fl.position.set(cx,0,cz); scene.add(fl); levelMeshes.push(fl);
  // Ceiling
  const cg=new THREE.PlaneGeometry(w,len);
  const cm=new THREE.MeshLambertMaterial({map:TEX.ceiling.clone()});
  cm.map.repeat.set(1,Math.floor(len/2));
  const cl=new THREE.Mesh(cg,cm);
  cl.rotation.x=Math.PI/2; cl.rotation.z=angle;
  cl.position.set(cx,WALL_H,cz); scene.add(cl); levelMeshes.push(cl);
}

// Torches (point lights)
function addTorch(x,y,z) {
  const light = new THREE.PointLight(0xff6600, 2.5, 8);
  light.position.set(x,y,z);
  scene.add(light);
  // Flicker
  light._base = 2.5;
  torches.push(light);
  // Visual flame
  const geo = new THREE.SphereGeometry(0.08,4,4);
  const mat = new THREE.MeshBasicMaterial({color:0xff8800});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x,y,z);
  scene.add(mesh);
}
const torches = [];

// ══════════════════════════════════════════════
//  BUILD LEVEL
// ══════════════════════════════════════════════
const spawnPoint = new THREE.Vector3(0, 1.7, 0);
const pickups = [];
const bullets = [];
const enemies = [];

function buildLevel() {
  // Room 1 - Start
  addRoom(0,0, 14,14, TEX.stone, TEX.floor, TEX.ceiling);
  addTorch(-5, 2.8, -5);
  addTorch(5, 2.8, -5);
  addTorch(-5, 2.8, 5);
  addTorch(5, 2.8, 5);

  // Corridor North
  addCorridor(0,-7, 0,-22, 4);
  addBox(2,WALL_H/2,-14.5, 0.3,WALL_H,4, new THREE.MeshLambertMaterial({map:TEX.stone}));
  addBox(-2,WALL_H/2,-14.5, 0.3,WALL_H,4, new THREE.MeshLambertMaterial({map:TEX.stone}));
  addTorch(0, 2.8, -14.5);

  // Room 2 - Arena
  addRoom(0,-30, 22,18, TEX.metal, TEX.floor, TEX.ceiling);
  addTorch(-8, 2.8, -30);
  addTorch(8, 2.8, -30);
  addTorch(0, 2.8, -24);
  addTorch(0, 2.8, -36);
  // Pillars
  [[-6,-27],[6,-27],[-6,-33],[6,-33]].forEach(([px,pz])=>{
    addBox(px,WALL_H/2,pz, 1.2,WALL_H,1.2, new THREE.MeshLambertMaterial({map:TEX.stone}));
  });

  // Corridor East
  addCorridor(11,-30, 24,-30, 4);
  addTorch(17.5, 2.8, -30);

  // Room 3 - Lava room
  addRoom(32,-30, 16,16, TEX.metal, TEX.lava, TEX.ceiling);
  addTorch(28, 2.8, -30);
  addTorch(36, 2.8, -30);
  addTorch(32, 2.8, -26);
  addTorch(32, 2.8, -34);
  // Lava light
  const lavaLight = new THREE.PointLight(0xff3300, 3, 16);
  lavaLight.position.set(32, 0.5, -30);
  scene.add(lavaLight);
  torches.push(lavaLight);

  // Corridor West
  addCorridor(0,-7, 0,10, 4);
  addTorch(0, 2.8, 3);

  // Room 4 - Weapon room
  addRoom(0,18, 12,12, TEX.metal, TEX.floor, TEX.ceiling);

const ENEMY_DEFS = {
  grunt:   {hp:50, speed:2.5, dmg:10, range:12, color:0x886644, size:0.8, reward:1},
  ogre:    {hp:150, speed:2.0, dmg:25, range:15, color:0x448844, size:1.1, reward:3},
  shambler:{hp:600, speed:1.5, dmg:60, range:20, color:0xaaaaaa, size:1.5, reward:10},
};

function spawnEnemy(x,y,z,type) {
  const def = ENEMY_DEFS[type];
  const group = new THREE.Group();
  group.position.set(x, 0, z);

  // Body
  const bodyGeo = new THREE.BoxGeometry(def.size*0.6, def.size, def.size*0.4);
  const bodyMat = new THREE.MeshLambertMaterial({color:def.color});
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = def.size/2;
  group.add(body);

  // Head
  const headGeo = new THREE.BoxGeometry(def.size*0.4, def.size*0.4, def.size*0.4);
  const headMat = new THREE.MeshLambertMaterial({color:new THREE.Color(def.color).offsetHSL(0,0,0.1)});
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = def.size + def.size*0.2;
  group.add(head);

  // Eyes (red)
  const eyeGeo = new THREE.BoxGeometry(def.size*0.08, def.size*0.08, def.size*0.05);
  const eyeMat = new THREE.MeshBasicMaterial({color:0xff0000});
  [-0.1,0.1].forEach(ox=>{
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(ox*def.size, def.size+def.size*0.22, def.size*0.2);
    group.add(eye);
  });

  scene.add(group);

  // Health bar canvas
  const hbCanvas = document.createElement('canvas');
  hbCanvas.width = 64; hbCanvas.height = 8;
  const hbTex = new THREE.CanvasTexture(hbCanvas);
  const hbGeo = new THREE.PlaneGeometry(1.2, 0.12);
  const hbMat = new THREE.MeshBasicMaterial({map:hbTex, transparent:true, depthTest:false});
  const hbMesh = new THREE.Mesh(hbGeo, hbMat);
  hbMesh.position.y = def.size*1.6;
  group.add(hbMesh);

  const e = {
    type, group, body, hbMesh, hbCanvas, hbTex,
    hp: def.hp, maxHp: def.hp,
    def, alive: true,
    alertDist: def.range,
    state: 'idle', // idle, alert, attack, dead
    attackTimer: 0, moveTimer: 0,
    vel: new THREE.Vector3(),
    pos: new THREE.Vector3(x, 0, z),
  };
  enemies.push(e);
  updateEnemyHpBar(e);
  return e;
}

function updateEnemyHpBar(e) {
  const ctx = e.hbCanvas.getContext('2d');
  ctx.clearRect(0,0,64,8);
  ctx.fillStyle='#330000'; ctx.fillRect(0,0,64,8);
  const frac = Math.max(0, e.hp/e.maxHp);
  const col = frac > 0.5 ? '#00ff44' : frac > 0.25 ? '#ffaa00' : '#ff2200';
  ctx.fillStyle = col;
  ctx.fillRect(0,0,Math.floor(64*frac),8);
  e.hbTex.needsUpdate = true;
}

const player = {

  vel: new THREE.Vector3(),
  yaw: 0,   // horizontal look
  pitch: 0, // vertical look
  hp: 100, armor: 0,

};

const PLAYER_RADIUS = 0.4;
const PLAYER_HEIGHT = 1.7;
const GRAVITY = 20;
const JUMP_SPEED = 7;
const MOVE_SPEED = 6;

// ══════════════════════════════════════════════
//  TOUCH INPUT
// ══════════════════════════════════════════════
const input = {
  moveX: 0, moveY: 0,   // joystick
  fireDown: false,
  jumpDown: false,
};

let lpadTouch = null, lpadOX = 0, lpadOY = 0;
let rpadActive = false, rpadId = -1, rpadLX = 0, rpadLY = 0;
let pcMouseDown = false, pcLastX = 0, pcLastY = 0, pointerLocked = false;
const LOOK_SENS = 0.0015;

function initControls() {
  const lpad = document.getElementById('lpad');
  const rpad = document.getElementById('rpad');
  const joyL = document.getElementById('joy-l');

  lpad.addEventListener('touchstart', e=>{
    e.preventDefault();
    const t = e.changedTouches[0];
    lpadTouch = t.identifier;
    lpadOX = t.clientX; lpadOY = t.clientY;
    joyL.style.display='block';
    joyL.style.left = t.clientX+'px'; joyL.style.top = t.clientY+'px';
    joyL.querySelector('.vdot').style.transform='translate(0,0)';
  },{passive:false});

  lpad.addEventListener('touchmove', e=>{
    e.preventDefault();
    for(let i=0;i<e.changedTouches.length;i++){
      const t=e.changedTouches[i];
      if(t.identifier!==lpadTouch) continue;
      const dx=t.clientX-lpadOX, dy=t.clientY-lpadOY;
      const dist=Math.min(40,Math.sqrt(dx*dx+dy*dy));
      const ang=Math.atan2(dy,dx);
      const nx=Math.cos(ang)*dist, ny=Math.sin(ang)*dist;
      input.moveX = nx/40; input.moveY = ny/40;
      joyL.querySelector('.vdot').style.transform=`translate(${nx}px,${ny}px)`;
    }
  },{passive:false});

  lpad.addEventListener('touchend', e=>{
    e.preventDefault();
    for(let i=0;i<e.changedTouches.length;i++){
      if(e.changedTouches[i].identifier===lpadTouch){
        lpadTouch=null;
        input.moveX=0; input.moveY=0;
        joyL.style.display='none';
      }
    }
  },{passive:false});

  // Right pad — drag-to-look (X и Y)
  rpad.addEventListener('touchstart', e=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    rpadActive=true; rpadId=t.identifier;
    rpadLX=t.clientX; rpadLY=t.clientY;
  },{passive:false});
  rpad.addEventListener('touchmove', e=>{
    e.preventDefault();
    for(let i=0;i<e.changedTouches.length;i++){
      const t=e.changedTouches[i];
      if(t.identifier!==rpadId) continue;
      const dx=t.clientX-rpadLX, dy=t.clientY-rpadLY;
      player.yaw   -= dx * LOOK_SENS * 55;
      player.pitch -= dy * LOOK_SENS * 55;
      player.pitch = Math.max(-1.4, Math.min(1.4, player.pitch));
      rpadLX=t.clientX; rpadLY=t.clientY;
    }
  },{passive:false});
  rpad.addEventListener('touchend', e=>{
    e.preventDefault();
    for(let i=0;i<e.changedTouches.length;i++){
      if(e.changedTouches[i].identifier===rpadId){rpadActive=false; rpadId=-1;}
    }
  },{passive:false});
  rpad.addEventListener('touchcancel',()=>{rpadActive=false; rpadId=-1;},{passive:false});

  // Fire button
  const btnFire = document.getElementById('btn-fire');
  btnFire.addEventListener('touchstart', e=>{e.preventDefault();e.stopPropagation();input.fireDown=true;},{passive:false});
  btnFire.addEventListener('touchend', e=>{e.preventDefault();e.stopPropagation();input.fireDown=false;},{passive:false});

  // Jump button
  const btnJump = document.getElementById('btn-jump');
  btnJump.addEventListener('touchstart', e=>{
    e.preventDefault();e.stopPropagation();
    if(player.onGround){player.vel.y=JUMP_SPEED;player.onGround=false;SFX.jump();}
  },{passive:false});

  // Weapon cycle
  document.getElementById('btn-wpn').addEventListener('touchstart', e=>{
    e.preventDefault();
    weaponIdx = (weaponIdx+1) % WEAPONS.length;
    updateHUD();
  },{passive:false});

  // Back button
  document.getElementById('btn-back').addEventListener('touchstart', e=>{
    e.preventDefault();
    showMenu();
  },{passive:false});
  document.getElementById('btn-back').addEventListener('click', ()=>showMenu());

  // ── PC mouse drag-to-look (без pointer lock как запасной)
  const cvs = document.getElementById('c');
  cvs.addEventListener('mousedown', e=>{
    if(e.button===0){
      input.fireDown=true;
      pcMouseDown=true; pcLastX=e.clientX; pcLastY=e.clientY;
      cvs.requestPointerLock&&cvs.requestPointerLock();
    }
  });
  cvs.addEventListener('mouseup', e=>{if(e.button===0) input.fireDown=false; pcMouseDown=false;});
  cvs.addEventListener('contextmenu', e=>e.preventDefault());

  document.addEventListener('pointerlockchange',()=>{
    pointerLocked=!!document.pointerLockElement;
    if(pointerLocked) pcMouseDown=false;
  });
  document.addEventListener('mousemove', e=>{
    if(!running) return;
    if(pointerLocked){
      player.yaw   -= e.movementX * 0.002;
      player.pitch -= e.movementY * 0.002;
    } else if(pcMouseDown){
      player.yaw   -= (e.clientX-pcLastX)*0.004;
      player.pitch -= (e.clientY-pcLastY)*0.004;
      pcLastX=e.clientX; pcLastY=e.clientY;
    }
    player.pitch=Math.max(-1.4,Math.min(1.4,player.pitch));
  });

  // Keyboard
  const keys = {};
  window.addEventListener('keydown', e=>{ keys[e.code]=true; });
  window.addEventListener('keyup', e=>{ keys[e.code]=false; });
  setInterval(()=>{
    if(!running) return;
    input.moveX = (keys['KeyD']?1:0)-(keys['KeyA']?1:0);
    input.moveY = (keys['KeyS']?1:0)-(keys['KeyW']?1:0);
    if(keys['Space']||keys['MouseLeft']) input.fireDown=true;
    if(keys['KeyE']&&player.onGround){player.vel.y=JUMP_SPEED;player.onGround=false;SFX.jump();keys['KeyE']=false;}
    if(keys['Digit1']) weaponIdx=0;
    if(keys['Digit2']) weaponIdx=1;
    if(keys['Digit3']) weaponIdx=2;
    if(keys['Digit4']) weaponIdx=3;
  },16);
}

// ══════════════════════════════════════════════
//  COLLISION HELPERS
// ══════════════════════════════════════════════
function collidesBox(px,py,pz,r,h) {
  for(const b of colliders) {
    if(px+r > b.minX && px-r < b.maxX &&
       py+h > b.minY && py   < b.maxY &&
       pz+r > b.minZ && pz-r < b.maxZ) return b;
  }
  return null;
}

function movePlayer(dt) {
  const spd = MOVE_SPEED;
  const cos = Math.cos(player.yaw);
  const sin = Math.sin(player.yaw);

  // Move
  const fwd = new THREE.Vector3(-sin, 0, -cos);
  const rgt = new THREE.Vector3(cos, 0, -sin);

  const moveVec = new THREE.Vector3();
  moveVec.addScaledVector(fwd, -input.moveY);
  moveVec.addScaledVector(rgt, input.moveX);
  if(moveVec.length() > 1) moveVec.normalize();
  moveVec.multiplyScalar(spd * dt);

  // Gravity
  if(!player.onGround) player.vel.y -= GRAVITY * dt;
  player.vel.y = Math.max(player.vel.y, -30);

  // Apply move X
  player.pos.x += moveVec.x;
  if(collidesBox(player.pos.x, player.pos.y-PLAYER_HEIGHT, player.pos.z, PLAYER_RADIUS, PLAYER_HEIGHT)) {
    player.pos.x -= moveVec.x;
  }
  // Apply move Z
  player.pos.z += moveVec.z;
  if(collidesBox(player.pos.x, player.pos.y-PLAYER_HEIGHT, player.pos.z, PLAYER_RADIUS, PLAYER_HEIGHT)) {
    player.pos.z -= moveVec.z;
  }
  // Apply Y
  player.pos.y += player.vel.y * dt;
  const col = collidesBox(player.pos.x, player.pos.y-PLAYER_HEIGHT, player.pos.z, PLAYER_RADIUS, PLAYER_HEIGHT);
  if(col) {
    if(player.vel.y < 0) {
      player.pos.y = col.maxY + PLAYER_HEIGHT;
      player.vel.y = 0;
      player.onGround = true;
    } else {
      player.pos.y = col.minY;
      player.vel.y = 0;
    }
  } else {
    player.onGround = false;
  }

  // Floor clamp
  if(player.pos.y < PLAYER_HEIGHT) {
    player.pos.y = PLAYER_HEIGHT;
    player.vel.y = 0;
    player.onGround = true;
  }

  // Step sound
  if(player.onGround && (Math.abs(input.moveX)>0.1||Math.abs(input.moveY)>0.1)){
    player.stepTimer -= dt;
    if(player.stepTimer <= 0) { SFX.step(); player.stepTimer = 0.4; }
  }

  camera.position.copy(player.pos);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;
}

// ══════════════════════════════════════════════
//  SHOOTING
// ══════════════════════════════════════════════
const raycaster = new THREE.Raycaster();

function shoot() {
  const wpn = WEAPONS[weaponIdx];
  if(ammoArr[weaponIdx] <= 0) { playTone(200,'square',0.05,0.1); return; }
  ammoArr[weaponIdx] -= wpn.cost;
  SFX[wpn.sfx]();

  if(wpn.rocket) {
    spawnRocket();
    return;
  }

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  dir.x += (Math.random()-0.5)*wpn.spread*2;
  dir.y += (Math.random()-0.5)*wpn.spread;
  dir.z += (Math.random()-0.5)*wpn.spread*2;
  dir.normalize();

  raycaster.set(camera.position, dir);
  const hits = raycaster.intersectObjects(scene.children, true);
  for(const hit of hits) {
    let found = null;
    for(const e of enemies) {
      if(!e.alive) continue;
      if(e.group.children.includes(hit.object) || hit.object === e.group) { found=e; break; }
      // check parent chain
      let o = hit.object;
      while(o.parent) { if(o === e.group){found=e;break;} o=o.parent; }
      if(found) break;
    }
    if(found) {
      const dmg = wpn.dmgMin + Math.floor(Math.random()*(wpn.dmgMax-wpn.dmgMin+1));
      hurtEnemy(found, dmg);
      SFX.hit();
      spawnHitEffect(hit.point);
      break;
    }
    // Hit wall - spawn spark
    spawnHitEffect(hit.point);
    break;
  }
  updateHUD();
}

function spawnRocket() {
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  const geo = new THREE.SphereGeometry(0.12,4,4);
  const mat = new THREE.MeshBasicMaterial({color:0xff6600});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(camera.position).addScaledVector(dir, 0.8);
  scene.add(mesh);
  const light = new THREE.PointLight(0xff4400, 3, 5);
  light.position.copy(mesh.position);
  scene.add(light);
  bullets.push({mesh, light, vel:dir.clone().multiplyScalar(18), life:3, rocket:true});
}

function updateBullets(dt) {
  for(let i=bullets.length-1;i>=0;i--) {
    const b = bullets[i];
    b.life -= dt;
    if(b.life <= 0) { destroyBullet(b,i); continue; }
    b.mesh.position.addScaledVector(b.vel, dt);
    if(b.light) b.light.position.copy(b.mesh.position);
    // Check enemy hits
    let hit = false;
    for(const e of enemies) {
      if(!e.alive) continue;
      if(b.mesh.position.distanceTo(e.group.position) < 1.5) {
        hurtEnemy(e, 80+Math.floor(Math.random()*40));
        hit = true; break;
      }
    }
    // Check wall collision
    if(!hit && collidesBox(b.mesh.position.x, b.mesh.position.y-0.1, b.mesh.position.z, 0.15, 0.2)) hit=true;
    if(hit) {
      SFX.explosion();
      spawnExplosion(b.mesh.position.clone());
      // Splash damage
      for(const e of enemies) {
        if(!e.alive) continue;
        const d = b.mesh.position.distanceTo(e.group.position);
        if(d < 4) hurtEnemy(e, Math.floor(100*(1-d/4)));
      }
      // Self damage
      const sd = b.mesh.position.distanceTo(player.pos);
      if(sd < 4) hurtPlayer(Math.floor(60*(1-sd/4)));
      destroyBullet(b,i);
    }
  }
}

function destroyBullet(b,i) {
  scene.remove(b.mesh); b.mesh.geometry.dispose();
  if(b.light) scene.remove(b.light);
  bullets.splice(i,1);
}

function spawnHitEffect(pos) {
  const geo = new THREE.SphereGeometry(0.06,4,4);
  const mat = new THREE.MeshBasicMaterial({color:0xffaa44});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  scene.add(mesh);
  setTimeout(()=>scene.remove(mesh), 80);
}

function spawnExplosion(pos) {
  const light = new THREE.PointLight(0xff6600, 6, 10);
  light.position.copy(pos);
  scene.add(light);
  const geo = new THREE.SphereGeometry(0.5,6,6);
  const mat = new THREE.MeshBasicMaterial({color:0xff4400});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  scene.add(mesh);
  let t = 0;
  const interval = setInterval(()=>{
    t += 0.05;
    mesh.scale.setScalar(1+t*3);
    mat.opacity = 1-t*2;
    mat.transparent = true;
    light.intensity = Math.max(0, 6-t*30);
    if(t >= 0.5) { clearInterval(interval); scene.remove(mesh); scene.remove(light); }
  },50);
}

// ══════════════════════════════════════════════
//  ENEMY AI
// ══════════════════════════════════════════════
function updateEnemies(dt) {
  for(const e of enemies) {
    if(!e.alive) continue;

    const dist = e.group.position.distanceTo(player.pos);
    e.hbMesh.lookAt(camera.position);

    // State machine
    if(e.state === 'idle') {
      if(dist < e.alertDist) { e.state='alert'; }
    }

    if(e.state === 'alert') {
      // Move toward player
      const dir = new THREE.Vector3().subVectors(player.pos, e.group.position);
      dir.y = 0; dir.normalize();

      e.group.position.addScaledVector(dir, e.def.speed * dt);
      e.group.position.y = 0;

      // Look at player
      e.group.lookAt(player.pos.x, 0, player.pos.z);

      // Collide with walls (simple)
      if(collidesBox(e.group.position.x, 0, e.group.position.z, 0.5, e.def.size+0.5)) {
        e.group.position.addScaledVector(dir, -e.def.speed * dt * 2);
      }

      // Attack
      e.attackTimer -= dt;
      if(dist < e.def.range*0.7 && e.attackTimer <= 0) {
        e.attackTimer = 1.5 + Math.random();
        if(dist < e.alertDist) {
          // Raycast check line of sight
          const eDir = new THREE.Vector3().subVectors(player.pos, e.group.position).normalize();
          raycaster.set(e.group.position.clone().setY(e.def.size), eDir);
          const hits = raycaster.intersectObjects(levelMeshes, false);
          const clearShot = hits.length === 0 || hits[0].distance > dist;
          if(clearShot) {
            const actualDmg = e.def.dmg + Math.floor(Math.random()*10-5);
            if(dist < e.alertDist * 0.8) hurtPlayer(actualDmg);
          }
        }
      }
    }

    // Death animation
    if(e.state === 'dead') {
      e.deathTimer = (e.deathTimer||0) + dt;
      if(e.deathTimer < 1.0) {
        e.group.rotation.z = Math.min(Math.PI/2, e.deathTimer * Math.PI * 0.6);
        e.group.position.y = Math.max(-e.def.size/2, -e.deathTimer * e.def.size * 0.6);
      }
    }
  }
}

function hurtEnemy(e, dmg) {
  if(!e.alive || e.state==='dead') return;
  e.hp -= dmg;
  updateEnemyHpBar(e);
  // Flash red
  e.body.material.emissive = new THREE.Color(0.5,0,0);
  setTimeout(()=>{ if(e.body.material) e.body.material.emissive.set(0,0,0); }, 120);

  if(e.hp <= 0) {
    e.alive = false; e.state='dead';
    SFX.death();
    player.kills++;
    document.getElementById('h-kills').textContent = player.kills;
    // Drop pickup
    if(Math.random() < 0.5) {
      const types = ['health','ammo','health'];
      spawnPickup(e.group.position.x, 0, e.group.position.z, types[Math.floor(Math.random()*types.length)]);
    }
  } else {
    SFX.hit();
  }
}

function hurtPlayer(dmg) {
  if(!player.alive) return;
  // Armor absorbs some
  let d = dmg;
  if(player.armor > 0) {
    const absorbed = Math.min(player.armor, Math.floor(d*0.7));
    player.armor -= absorbed;
    d -= absorbed;
  }
  player.hp -= d;
  SFX.pain();
  // Flash
  const flash = document.getElementById('dmg-flash');
  flash.classList.add('hit');
  setTimeout(()=>flash.classList.remove('hit'), 150);
  updateHUD();
  if(player.hp <= 0) killPlayer();
}

// ══════════════════════════════════════════════
//  PICKUPS UPDATE
// ══════════════════════════════════════════════
function updatePickups(dt) {
  for(const p of pickups) {
    if(!p.alive) continue;
    p.mesh.rotation.y += dt * 2;
    p.mesh.position.y = 0.5 + Math.sin(Date.now()*0.002)*0.1;
    if(p.mesh.position.distanceTo(player.pos) < 1.2) {
      collectPickup(p);
    }
  }
}

function collectPickup(p) {
  p.alive = false;
  scene.remove(p.mesh);
  SFX.pickup();
  let msg = '';
  if(p.type === 'health') {
    player.hp = Math.min(100, player.hp + 25);
    msg = '💊 +25 HP';
  } else if(p.type === 'armor') {
    player.armor = Math.min(100, player.armor + 50);
    msg = '🛡 +50 ARMOR';
  } else if(p.type === 'ammo') {
    ammoArr[0] += 15; ammoArr[2] += 15;
    msg = '📦 +AMMO';
  } else if(p.type === 'weapon_rl') {
    weaponIdx = 3; ammoArr[3] += 10;
    msg = '🚀 ROCKET LAUNCHER!';
  } else if(p.type === 'weapon_ssg') {
    weaponIdx = 1; ammoArr[1] += 20;
    msg = '💥 SUPER SHOTGUN!';
  }
  showPickupMsg(msg);
  updateHUD();
}

function showPickupMsg(txt) {
  const el = document.getElementById('pickup-msg');
  el.textContent = txt; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 1800);
}

// ══════════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════════
function updateHUD() {
  document.getElementById('h-hp').textContent = Math.max(0,player.hp);
  document.getElementById('h-hp').className = 'hud-val' + (player.hp < 25 ? ' low' : '');
  document.getElementById('h-arm').textContent = player.armor;
  document.getElementById('h-ammo').textContent = ammoArr[weaponIdx];
  document.getElementById('h-ammo-lbl').textContent = WEAPONS[weaponIdx].sprite + ' ' + WEAPONS[weaponIdx].name.substring(0,3);
  // Face
  const face = player.hp > 75 ? '😠' : player.hp > 50 ? '😤' : player.hp > 25 ? '😨' : '💀';
  document.getElementById('hud-face').textContent = face;
}

// ══════════════════════════════════════════════
//  WEAPON VIEW MODEL (Canvas overlay)
// ══════════════════════════════════════════════
let weaponAnim = 0, weaponFire = 0;

const wpnCanvas = document.createElement('canvas');
wpnCanvas.style.cssText='position:fixed;bottom:0;left:50%;transform:translateX(-50%);pointer-events:none;z-index:15;image-rendering:pixelated';
wpnCanvas.width = 240; wpnCanvas.height = 180;
document.body.appendChild(wpnCanvas);
const wpnCtx = wpnCanvas.getContext('2d');

function drawWeapon() {
  wpnCtx.clearRect(0,0,240,180);
  const wpn = WEAPONS[weaponIdx];
  const bob = Math.sin(weaponAnim)*4;
  const recoil = weaponFire * 20;
  const y = 80 + bob + recoil;

  wpnCtx.save();
  wpnCtx.translate(120, y);

  if(weaponIdx === 0) drawShotgun(wpnCtx);
  else if(weaponIdx === 1) drawSShotgun(wpnCtx);
  else if(weaponIdx === 2) drawNailgun(wpnCtx);
  else if(weaponIdx === 3) drawRocketLauncher(wpnCtx);

  // Muzzle flash
  if(weaponFire > 0.5) {
    wpnCtx.globalAlpha = weaponFire - 0.4;
    wpnCtx.fillStyle='#ffdd00';
    wpnCtx.beginPath();
    wpnCtx.arc(-20, -30, 15+Math.random()*5,0,Math.PI*2);
    wpnCtx.fill();
    wpnCtx.fillStyle='#ffffff';
    wpnCtx.beginPath();
    wpnCtx.arc(-20,-30,8,0,Math.PI*2);
    wpnCtx.fill();
    wpnCtx.globalAlpha=1;
  }
  wpnCtx.restore();
}

function drawShotgun(ctx) {
  // Stock
  ctx.fillStyle='#6b4226'; ctx.fillRect(-10,0,80,16);
  // Barrel
  ctx.fillStyle='#555'; ctx.fillRect(-80,-8,70,10);
  ctx.fillStyle='#333'; ctx.fillRect(-82,-6,8,6);
  // Guard
  ctx.fillStyle='#888'; ctx.fillRect(-20,-2,20,18);
  // Handle
  ctx.fillStyle='#6b4226'; ctx.fillRect(10,16,20,30);
}
function drawSShotgun(ctx) {
  ctx.fillStyle='#5a3a1a'; ctx.fillRect(-10,0,90,18);
  ctx.fillStyle='#444'; ctx.fillRect(-80,-10,75,10);
  ctx.fillStyle='#444'; ctx.fillRect(-80,-4,75,10);
  ctx.fillStyle='#333'; ctx.fillRect(-82,-8,8,10);
  ctx.fillStyle='#777'; ctx.fillRect(-20,-2,22,20);
  ctx.fillStyle='#5a3a1a'; ctx.fillRect(12,18,18,32);
}
function drawNailgun(ctx) {
  ctx.fillStyle='#555'; ctx.fillRect(-80,-6,100,12);
  ctx.fillStyle='#444'; ctx.fillRect(-80,-4,6,8);
  ctx.fillStyle='#777'; ctx.fillRect(-30,-10,50,24);
  ctx.fillStyle='#999'; ctx.fillRect(-60,-2,30,4);
  ctx.fillStyle='#333'; ctx.fillRect(10,4,30,20);
}
function drawRocketLauncher(ctx) {
  ctx.fillStyle='#4a8'; ctx.fillRect(-90,-12,110,24);
  ctx.fillStyle='#375'; ctx.fillRect(-92,-10,8,20);
  ctx.fillStyle='#7ce'; ctx.beginPath(); ctx.arc(-85,0,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#999'; ctx.fillRect(-40,-16,80,10);
  ctx.fillStyle='#888'; ctx.fillRect(-10,8,40,20);
}

// ══════════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════════
let lastTime = 0;
let running = false;

function gameLoop(ts) {
  if(!running) return;
  requestAnimationFrame(gameLoop);

  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;

  if(!player.alive) return;

  // Torch flicker
  for(const t of torches) {
    t.intensity = t._base * (0.85 + Math.random()*0.3);
  }

  // Fire
  if(input.fireDown && fireTimer <= 0) {
    shoot();
    weaponFire = 1.0;
    fireTimer = WEAPONS[weaponIdx].rate;
  }
  fireTimer = Math.max(0, fireTimer - dt);
  weaponFire = Math.max(0, weaponFire - dt * 6);

  // Weapon bob
  if(Math.abs(input.moveX)>0.1||Math.abs(input.moveY)>0.1) weaponAnim += dt * 8;

  // Player movement
  movePlayer(dt);

  // Enemies
  updateEnemies(dt);

  // Bullets
  updateBullets(dt);

  // Pickups
  updatePickups(dt);

  // Draw weapon
  drawWeapon();

  // Check win
  const livingEnemies = enemies.filter(e=>e.alive).length;
  if(livingEnemies === 0 && enemies.length > 0) {
    showPickupMsg('🏆 ВСЕ ВРАГИ УНИЧТОЖЕНЫ!');
  }

  renderer.render(scene, camera);
}

// ══════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════
function startGame() {
  AC.resume();
  document.getElementById('menu').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('ctrl').style.display='block';
  wpnCanvas.style.display='block';

  // Reset player
  player.pos.set(0, PLAYER_HEIGHT, 0);
  player.vel.set(0,0,0);
  player.yaw = 0; player.pitch = 0;
  player.hp = 100; player.armor = 0;
  player.kills = 0; player.alive = true;
  player.onGround = false;

  // Reset ammo weapons
  ammoArr = [50,0,50,0];
  weaponIdx = 0;
  fireTimer = 0;

  // Build level
  levelMeshes.length = 0;
  colliders.length = 0;
  bullets.length = 0;
  pickups.length = 0;
  enemies.length = 0;

  // Remove old meshes
  while(scene.children.length > 0) scene.remove(scene.children[0]);
  scene.add(ambient);

  buildLevel();
  updateHUD();
  running = true;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function killPlayer() {
  player.alive = false;
  running = false;
  document.getElementById('death-kills').textContent = `Убито врагов: ${player.kills}`;
  document.getElementById('death-screen').style.display = 'flex';
  document.getElementById('hud').style.display = 'none';
}

function respawn() {
  document.getElementById('death-screen').style.display='none';
  startGame();
}

function showMenu() {
  running = false;
  window.parent.postMessage({type:'gameClose',game:'quake'},'*');
  document.getElementById('menu').style.display='flex';
  document.getElementById('hud').style.display='none';
  document.getElementById('ctrl').style.display='none';
  wpnCanvas.style.display='none';
}

// ══════════════════════════════════════════════
//  RESIZE
// ══════════════════════════════════════════════
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
  wpnCanvas.style.width = Math.min(w, h*1.5) + 'px';
}
window.addEventListener('resize', onResize);
onResize();

initControls();
</script>

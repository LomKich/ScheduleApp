name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ FIX 1: нормальная инициализация SDK + лицензии
      - name: Install Android SDK components
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

          yes | sdkmanager --licenses > /dev/null

          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # ✅ Gradle (убрал фикс версии — используем wrapper)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # ✅ FIX 2: права на gradlew (у тебя не было!)
      - name: Grant execute permission
        run: chmod +x gradlew

      # ✅ keystore
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> $GITHUB_ENV

      # ✅ версия (улучшил парсинг)
      - name: Read version
        id: get_version
        run: |
          VERSION=$(grep versionName app/build.gradle | head -1 | cut -d '"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Версия: $VERSION"

      # ✅ PATCH (оставил твою логику, она норм)
      - name: Generate patch-manifest.json
        id: gen_manifest
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          ASSETS_DIR="app/src/main/assets"
          REPO="LomKich/ScheduleApp"
          TAG="v${VERSION}"
          PATCH_DIR="patch_files"
          mkdir -p "$PATCH_DIR"

          echo "{" > patch-manifest.json
          echo "  \"version\": \"${VERSION}\"," >> patch-manifest.json
          echo "  \"files\": {" >> patch-manifest.json

          FIRST=true

          while IFS= read -r FILEPATH; do
            FILE="${FILEPATH#${ASSETS_DIR}/}"
            SHA=$(sha256sum "$FILEPATH" | awk '{print $1}')
            SAFE_NAME="patch$(echo "$FILE" | tr '/' '')"
            RAW_URL="https://github.com/${REPO}/releases/download/${TAG}/${SAFE_NAME}"

            if [ "$FIRST" = true ]; then FIRST=false; else printf ",\n" >> patch-manifest.json; fi

            printf "    \"%s\": { \"sha\": \"%s\", \"url\": \"%s\" }" "$FILE" "$SHA" "$RAW_URL" >> patch-manifest.json

            cp "$FILEPATH" "${PATCH_DIR}/${SAFE_NAME}"

          done < <(find "$ASSETS_DIR" -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) | sort)

          printf "\n  }\n}\n" >> patch-manifest.json

          echo "patch_dir=$PATCH_DIR" >> $GITHUB_OUTPUT

      # ✅ FIX 3: используем ./gradlew (а не gradle!)
      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: schedule
        run: ./gradlew assembleRelease

      # ✅ rename
      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/ScheduleApp-v${{ steps.get_version.outputs.version }}.apk

      # ✅ artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScheduleApp-v${{ steps.get_version.outputs.version }}
          path: app/build/outputs/apk/release/ScheduleApp-v${{ steps.get_version.outputs.version }}.apk

      # ✅ delete old release
      - name: Delete existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ steps.get_version.outputs.version }}" --yes 2>/dev/null || true
          git push origin --delete "v${{ steps.get_version.outputs.version }}" 2>/dev/null || true
# ✅ release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: "ScheduleApp v${{ steps.get_version.outputs.version }}"
          body: |
            Автосборка из ветки ${{ github.ref_name }}
            Коммит: ${{ github.sha }}

            🔥 Поддержка hot-patch обновлений
          files: |
            app/build/outputs/apk/release/ScheduleApp-v${{ steps.get_version.outputs.version }}.apk
            patch-manifest.json
            ${{ steps.gen_manifest.outputs.patch_dir }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ cleanup
      - name: Cleanup keystore
        if: always()
        run: rm -f $RUNNER_TEMP/release.jks
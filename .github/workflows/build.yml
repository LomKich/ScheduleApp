name: Build & Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ═══════════════════════════════════════════════
  # JOB 1 — Android APK
  # ═══════════════════════════════════════════════
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> $GITHUB_ENV

      - name: Read version
        id: get_version
        run: |
          VERSION=$(grep "^APP_VERSION=" gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate patch-manifest.json
        id: gen_manifest
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          ASSETS_DIR="app/src/main/assets"
          REPO="${{ github.repository }}"
          TAG="v${VERSION}"
          PATCH_DIR="patch_files"
          mkdir -p "$PATCH_DIR"

          echo "{" > patch-manifest.json
          echo "  \"version\": \"${VERSION}\"," >> patch-manifest.json
          echo "  \"files\": {" >> patch-manifest.json

          FIRST=true
          while IFS= read -r FILEPATH; do
            FILE="${FILEPATH#${ASSETS_DIR}/}"
            SHA=$(sha256sum "$FILEPATH" | awk '{print $1}')
            SAFE_NAME="patch__$(echo "$FILE" | tr '/' '__')"
            RAW_URL="https://github.com/${REPO}/releases/download/${TAG}/${SAFE_NAME}"
            if [ "$FIRST" = true ]; then FIRST=false; else printf ",\n" >> patch-manifest.json; fi
            printf "    \"%s\": { \"sha\": \"%s\", \"url\": \"%s\" }" "$FILE" "$SHA" "$RAW_URL" >> patch-manifest.json
            cp "$FILEPATH" "${PATCH_DIR}/${SAFE_NAME}"
          done < <(find "$ASSETS_DIR" -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) | sort)

          printf "\n  }\n}\n" >> patch-manifest.json
          echo "patch_dir=$PATCH_DIR" >> $GITHUB_OUTPUT

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: schedule
        run: gradle assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/ScheduleApp-v${{ steps.get_version.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.get_version.outputs.version }}
          path: app/build/outputs/apk/release/ScheduleApp-v${{ steps.get_version.outputs.version }}.apk

      - name: Upload patch artifact
        uses: actions/upload-artifact@v4
        with:
          name: patch-${{ steps.get_version.outputs.version }}
          path: |
            patch-manifest.json
            ${{ steps.gen_manifest.outputs.patch_dir }}/

      - name: Cleanup keystore
        if: always()
        run: rm -f $RUNNER_TEMP/release.jks

  # ═══════════════════════════════════════════════
  # JOB 2 — Desktop EXE (Electron / Windows)
  # ВАЖНО: запускается на windows-latest, чтобы NSIS компилировался
  # нативно и создавал настоящий установщик, а не portable exe.
  # На ubuntu+Wine NSIS часто падает или генерирует portable.
  # ═══════════════════════════════════════════════
  build-desktop:
    name: 🖥️ Build Desktop Installer (Windows)
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version from gradle.properties
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep "^APP_VERSION=" gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Sync version into package.json
        shell: bash
        run: node scripts/sync-version.js

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: cd desktop && npm ci

      - name: Build Windows NSIS Installer
        run: |
          cd desktop
          npx electron-builder --win --x64 --publish never

      - name: Verify installer was created (must be Setup.exe, not portable)
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          # Ищем именно Setup.exe (NSIS installer), не portable
          INSTALLER=$(find desktop/dist -name "*Setup*.exe" -o -name "*setup*.exe" | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "❌ NSIS Setup.exe не найден! Список dist:"
            ls desktop/dist/
            # Берём любой .exe как fallback — но это проблема
            INSTALLER=$(find desktop/dist -name "*.exe" | head -1)
            echo "⚠️ Используем fallback: $INSTALLER"
          else
            echo "✅ Installer найден: $INSTALLER"
          fi
          cp "$INSTALLER" "ScheduleApp-v${VERSION}-Setup.exe"
          echo "installer_path=ScheduleApp-v${VERSION}-Setup.exe" >> $GITHUB_ENV

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-${{ steps.get_version.outputs.version }}
          path: ScheduleApp-v${{ steps.get_version.outputs.version }}-Setup.exe

  # ═══════════════════════════════════════════════
  # JOB 3 — Единый GitHub Release (APK + EXE + патчи)
  # ═══════════════════════════════════════════════
  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: [ build-android, build-desktop ]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare files
        id: prep
        run: |
          VERSION="${{ needs.build-android.outputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          APK=$(find artifacts/apk-* -name "*.apk" | head -1)
          EXE=$(find artifacts/exe-* -name "*.exe" | head -1)
          MANIFEST=$(find artifacts/patch-* -name "patch-manifest.json" | head -1)
          echo "apk=$APK" >> $GITHUB_OUTPUT
          echo "exe=$EXE" >> $GITHUB_OUTPUT
          echo "manifest=$MANIFEST" >> $GITHUB_OUTPUT

      - name: Delete existing release & tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ steps.prep.outputs.version }}" --yes 2>/dev/null || true
          git push origin --delete "v${{ steps.prep.outputs.version }}" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.prep.outputs.version }}
          name: "ScheduleApp v${{ steps.prep.outputs.version }}"
          body: |
            Автосборка из ветки `${{ github.ref_name }}`
            Коммит: `${{ github.sha }}`

            ## Скачать

            | Платформа | Файл |
            |-----------|------|
            | 🤖 Android | `ScheduleApp-v${{ steps.prep.outputs.version }}.apk` |
            | 🖥️ Windows  | `ScheduleApp-v${{ steps.prep.outputs.version }}-Setup.exe` |

            **Горячий патч**: нажми 🔥 в настройках — обновятся только изменённые JS/HTML файлы без переустановки.
          files: |
            ${{ steps.prep.outputs.apk }}
            ${{ steps.prep.outputs.exe }}
            ${{ steps.prep.outputs.manifest }}
            artifacts/patch-${{ steps.prep.outputs.version }}/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

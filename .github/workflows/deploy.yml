name: 🌐 Deploy Web Version

# Запускается при пуше в main если изменились JS/HTML файлы
on:
  push:
    branches: [main]
    paths:
      - 'app/src/main/assets/**'
      - 'web/**'
      - '.github/workflows/deploy.yml'
  # Ручной запуск из GitHub Actions UI (кнопка Run workflow)
  workflow_dispatch:

# Разрешения для GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Только один деплой одновременно
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # ─── 1. Получаем код ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── 2. Сборка: копируем JS из Android assets ─────────────────
      # app/src/main/assets/ — единый источник для Android, Desktop и Web
      - name: Build web distribution
        run: |
          set -e

          ASSETS="app/src/main/assets"
          DIST="_site"   # стандартная папка для GitHub Pages

          echo "📁 Создаём папку сборки..."
          rm -rf "$DIST"
          mkdir -p "$DIST/js"

          # ── index.html ────────────────────────────────────────────
          echo "📄 Обрабатываем index.html..."

          # Берём Android index.html — это источник истины
          # Убираем desktop-patch.js (нужен только в Electron, не в браузере)
          sed '/desktop-patch\.js/d' "$ASSETS/index.html" > "$DIST/index.html"

          # Вставляем регистрацию Service Worker перед </body>
          sed -i 's|</body>|<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js").then(()=>console.log("[SW] ok")).catch(console.warn);}</script>\n</body>|' "$DIST/index.html"

          # Добавляем PWA manifest
          sed -i 's|</head>|<link rel="manifest" href="/manifest.json">\n</head>|' "$DIST/index.html"

          echo "   ✅ $(wc -c < "$DIST/index.html") байт"

          # ── JS файлы ──────────────────────────────────────────────
          echo "📦 Копируем JS файлы..."
          COPIED=0
          for f in "$ASSETS/js"/*.js; do
            fname=$(basename "$f")
            # desktop-patch.js — только для Electron, в браузере не нужен
            if [ "$fname" = "desktop-patch.js" ]; then
              echo "   ⏭  Пропущен: $fname (только Electron)"
              continue
            fi
            cp "$f" "$DIST/js/$fname"
            echo "   ✅ $fname ($(wc -c < "$DIST/js/$fname") байт)"
            COPIED=$((COPIED + 1))
          done
          echo "   Скопировано: $COPIED файлов"

          # ── Service Worker ────────────────────────────────────────
          echo "⚙️  Копируем Service Worker..."
          cp web/sw.js "$DIST/sw.js"

          # ── PWA Manifest ──────────────────────────────────────────
          echo "📱 Генерируем PWA manifest..."
          cat > "$DIST/manifest.json" << 'MANIFEST'
          
          # ── Итог ─────────────────────────────────────────────────
          echo ""
          echo "📊 Результат сборки:"
          echo "   HTML:     $(wc -c < "$DIST/index.html") байт"
          echo "   JS файлы: $(ls "$DIST/js" | wc -l) шт."
          echo "   Размер:   $(du -sh "$DIST" | cut -f1)"

      # ─── 3. Синхронизируем файлы расписания в scheduletxt ────────
      # Если в репо есть папка schedule/ с .docx файлами —
      # автоматически заливаем их как резерв на GitHub
      - name: Sync schedule files to scheduletxt
        if: hashFiles('schedule/*.docx', 'schedule/*.doc') != ''
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "📅 Синхронизируем файлы расписания..."
          git clone https://x-access-token:${GH_PAT}@github.com/LomKich/scheduletxt.git /tmp/scheduletxt
          cp schedule/*.docx /tmp/scheduletxt/ 2>/dev/null || true
          cp schedule/*.doc  /tmp/scheduletxt/ 2>/dev/null || true
          cd /tmp/scheduletxt
          git config user.name  "ScheduleApp CI"
          git config user.email "ci@scheduleapp.local"
          git add -A
          if git diff --cached --quiet; then
            echo "   ℹ️  Изменений нет, пропускаем"
          else
            git commit -m "🔄 Авто-синхронизация расписания [skip ci]"
            git push
            echo "   ✅ Файлы расписания обновлены в scheduletxt"
          fi

      # ─── 4. Загружаем артефакт для GitHub Pages ───────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # ─── 5. Деплоим на GitHub Pages ───────────────────────────────
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # ─── 6. Вывод результата ──────────────────────────────────────
      - name: Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║  ✅  Веб-версия задеплоена на GitHub Pages!          ║"
          echo "║  🌐  ${{ steps.deploy.outputs.page_url }}            ║"
          echo "╚══════════════════════════════════════════════════════╝"
